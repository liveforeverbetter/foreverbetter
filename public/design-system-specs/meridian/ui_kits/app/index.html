<!-- @dsCard group="App" viewport="440x780" name="Meridian app" subtitle="Interactive mobile kit — Overview, Action Plan, Genetics, Biomarkers, Wearables" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meridian — App Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;background:#050608;min-height:100%}
  body{display:flex;align-items:flex-start;justify-content:center;padding:28px 20px;font-family:var(--font-sans)}
  @media (max-width:460px){
    body{padding:0}
    #root{transform:scale(calc(100vw/402));transform-origin:top center}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="PhoneFrame.jsx"></script>
<script type="text/babel" src="OverviewScreen.jsx"></script>
<script type="text/babel" src="ActionPlanScreen.jsx"></script>
<script type="text/babel" src="GeneticsScreen.jsx"></script>
<script type="text/babel" src="BiomarkersScreen.jsx"></script>
<script type="text/babel" src="WearablesScreen.jsx"></script>
<script type="text/babel" src="HealthspanScreen.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;
const M = window.MeridianDesignSystem_0f3f3a;

function App(){
  const { TabBar, Icon } = M;
  const [authed,setAuthed]=useState(false);
  const [tab,setTab]=useState('overview');
  const [overlay,setOverlay]=useState(null);

  const go=(t)=>{ setOverlay(null); setTab(t); };
  const open=(t)=>{ ['overview','plan','genetics','biomarkers','wearables'].includes(t) ? go(t) : setOverlay(t); };

  let body;
  if(overlay==='healthspan') body=<window.HealthspanScreen onBack={()=>setOverlay(null)} />;
  else if(tab==='overview') body=<window.OverviewScreen onOpen={open} />;
  else if(tab==='plan') body=<window.ActionPlanScreen/>;
  else if(tab==='genetics') body=<window.GeneticsScreen/>;
  else if(tab==='biomarkers') body=<window.BiomarkersScreen/>;
  else body=<window.WearablesScreen/>;

  return (
    <window.PhoneFrame statusTime="4:04">
      {!authed ? <window.LoginScreen onEnter={()=>setAuthed(true)} /> : (
        <React.Fragment>
          {body}
          <TabBar value={overlay?'':tab} onChange={go}
            items={[
              {value:'overview',label:'Overview',icon:'overview'},
              {value:'plan',label:'Plan',icon:'plan'},
              {value:'genetics',label:'Genetics',icon:'genetics'},
              {value:'biomarkers',label:'Biomarkers',icon:'biomarkers'},
              {value:'wearables',label:'Wearables',icon:'wearables'},
            ]}/>
        </React.Fragment>
      )}
    </window.PhoneFrame>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
