<!-- @dsCard group="6 · Components" name="Loader" subtitle="Processing indicator — animated spinner" viewport="900x420" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loader — OMS Design System</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--bg-page-default, #fff); }
  body {
    padding: 44px 48px 64px;
    font-family: var(--font-main, "Fustat"), system-ui, sans-serif;
    color: var(--fg-primary);
  }
  .page-header { margin: 0 0 40px; }
  .page-title {
    font-family: var(--font-main, "Fustat");
    font-weight: 700; font-size: 40px; line-height: 1.2;
    color: var(--slate-900, #141635); margin: 0 0 12px;
  }
  .page-desc {
    font-family: "Geist", system-ui, sans-serif;
    font-weight: 400; font-size: 16px; line-height: 24px;
    color: var(--slate-500, #64708F); margin: 0; max-width: 930px;
  }

  .specimens { display: flex; flex-direction: row; gap: 64px; align-items: flex-end; margin-top: 8px; }
  .specimen { display: flex; flex-direction: column; gap: 16px; align-items: center; }
  .specimen__label {
    font-family: "Geist", system-ui, sans-serif;
    font-weight: 500; font-size: 13px;
    color: var(--purple-700, #670DE5);
  }

  /* ── Spinner ──────────────────────────────────────────────────── */
  .oms-loader {
    border-radius: 50%;
    border-style: solid;
    border-color: var(--slate-200, #E1E5F0);
    border-top-color: #670DE5;
    animation: oms-spin 0.7s linear infinite;
  }
  .oms-loader--lg { width: 40px; height: 40px; border-width: 4px; }
  .oms-loader--md { width: 28px; height: 28px; border-width: 3px; }
  .oms-loader--sm { width: 20px; height: 20px; border-width: 2.5px; }
  @keyframes oms-spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .oms-loader { animation-duration: 2.4s; } }
</style>
</head>
<body>

  <header class="page-header">
    <h1 class="page-title">Loader</h1>
    <p class="page-desc">Visual indicator used to communicate that content, data, or an action is currently being processed. It provides immediate feedback to users, reassuring them that the system is working and helping manage expectations during short wait times.</p>
  </header>

  <div class="specimens">
    <div class="specimen">
      <span class="oms-loader oms-loader--lg" role="status" aria-label="Loading"></span>
      <span class="specimen__label">Large</span>
    </div>
    <div class="specimen">
      <span class="oms-loader oms-loader--md" role="status" aria-label="Loading"></span>
      <span class="specimen__label">Medium</span>
    </div>
    <div class="specimen">
      <span class="oms-loader oms-loader--sm" role="status" aria-label="Loading"></span>
      <span class="specimen__label">Small</span>
    </div>
  </div>

</body>
</html>
