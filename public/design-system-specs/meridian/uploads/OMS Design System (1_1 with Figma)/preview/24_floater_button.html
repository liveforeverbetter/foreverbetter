<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Floater Button</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components/floater_button.css" />
<style>
  html, body { margin: 0; background: #fff; }
  body {
    font-family: var(--font-display);
    color: var(--fg-primary);
    padding: 64px;
    display: flex;
    flex-direction: column;
    gap: 56px;
  }
  h1 { margin: 0; font-size: 40px; font-weight: 700; letter-spacing: -0.01em; }
  .blurb { color: var(--slate-500); font-family: var(--font-doc); font-size: 14px; max-width: 560px; line-height: 1.5; margin: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }
  .frame {
    border: 1px solid var(--slate-200);
    border-radius: 24px;
    background: #fff;
    padding: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }
  .label {
    font-family: var(--font-doc);
    font-size: 12px;
    color: var(--slate-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 8px;
  }
  .scene {
    grid-column: 1 / -1;
    position: relative;
    height: 280px;
    border: 1px solid var(--slate-200);
    border-radius: 24px;
    background:
      linear-gradient(0deg, var(--slate-50) 0%, #fff 100%);
    padding: 24px;
    overflow: hidden;
  }
  .scene__hint {
    font-family: var(--font-doc);
    font-size: 12px;
    color: var(--slate-500);
  }
  .anchor-fab {
    position: absolute;
    right: 28px;
    bottom: 28px;
  }
</style>
</head>
<body>

  <header>
    <h1>Floater Button</h1>
    <p class="blurb">Page-level floating action button. 60×60 disc, fully round, with a 32×32 white icon centered, in brand purple-700.</p>
  </header>

  <div class="grid">

    <div>
      <p class="label">Default · Support / headset</p>
      <div class="frame">
        <button class="oms-floater" aria-label="Contact support">
          <span class="oms-floater__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a9 9 0 0 1 18 0v9a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"></path></svg>
          </span>
        </button>
      </div>
    </div>

    <div>
      <p class="label">Default · Add / new</p>
      <div class="frame">
        <button class="oms-floater" aria-label="New customer">
          <span class="oms-floater__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </span>
        </button>
      </div>
    </div>

    <div class="scene">
      <p class="scene__hint">Anchored bottom-right of the page (typical placement)</p>
      <button class="oms-floater anchor-fab" aria-label="Contact support">
        <span class="oms-floater__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a9 9 0 0 1 18 0v9a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"></path></svg>
        </span>
      </button>
    </div>

  </div>

</body>
</html>
