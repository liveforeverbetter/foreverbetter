<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--slate-50); }
  body { padding: 28px 28px 36px; font-family: var(--font-doc); color: var(--fg-primary); }
  .note { font-family: var(--font-doc); font-size: 11px; color: var(--fg-secondary); margin: 0 0 18px; max-width: 640px; line-height: 1.5; }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .tile { width: 100%; height: 96px; background: #fff; border: 1px solid var(--slate-200); border-radius: 14px; }
  .name { font-family: var(--font-doc); font-weight: 600; font-size: 12px; color: var(--fg-primary); }
  .meta { font-family: var(--font-doc); font-size: 10px; color: var(--fg-secondary); text-align: center; }
  .token { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }
</style>
</head>
<body>
  <p class="note">Elevation is reserved for transient overlays. Cards, panels, buttons and inputs use borders, not shadow.</p>
  <div class="row">
    <div class="item">
      <div class="tile" style="box-shadow: var(--shadow-popover)"></div>
      <div class="name">Popover</div>
      <div class="meta">menus, tooltips, date pickers</div>
      <div class="token">--shadow-popover</div>
    </div>
    <div class="item">
      <div class="tile" style="box-shadow: var(--shadow-modal)"></div>
      <div class="name">Modal</div>
      <div class="meta">dialogs, confirmations</div>
      <div class="token">--shadow-modal</div>
    </div>
    <div class="item">
      <div class="tile" style="box-shadow: var(--shadow-drawer)"></div>
      <div class="name">Drawer</div>
      <div class="meta">side sheets, slide-over panels</div>
      <div class="token">--shadow-drawer</div>
    </div>
  </div>
</body>
</html>
