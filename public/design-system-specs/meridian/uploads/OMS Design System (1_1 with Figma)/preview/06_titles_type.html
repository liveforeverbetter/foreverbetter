<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Titles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-page-default); }
  body { padding: 22px 28px; font-family: var(--font-body); color: var(--fg-primary); }
  .row { display: flex; align-items: baseline; justify-content: space-between; padding: 6px 0; gap: 16px; }
  .row + .row { border-top: 1px dashed var(--slate-200); padding-top: 10px; margin-top: 4px; }
  .meta { font-family: var(--font-doc); font-size: 11px; color: var(--fg-secondary); white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><span class="t-h1" style="font-size:48px">Create deposit address</span><span class="meta">H1 · Fustat Bold · 48 / 1.2</span></div>
  <div class="row"><span class="t-h2">Create deposit address</span><span class="meta">H2 · Fustat Bold · 40 / 1.2</span></div>
  <div class="row"><span class="t-h3">Create deposit address</span><span class="meta">H3 · Fustat Bold · 32 / 1.2</span></div>
  <div class="row"><span class="t-h4">Create deposit address</span><span class="meta">H4 · Fustat Bold · 28 / 1.2</span></div>
  <div class="row"><span class="t-h5">Create deposit address</span><span class="meta">H5 · Fustat Bold · 24 / 1.2</span></div>
</body>
</html>
