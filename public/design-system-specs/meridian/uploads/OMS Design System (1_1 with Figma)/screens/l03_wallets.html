<!DOCTYPE html>
<!-- @dsCard group="7 · Layouts" name="Wallets" subtitle="Wallet table with custodial / non-custodial / external tabs" viewport="1440x1024" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OMS · Wallets</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components/sidebar.css?v=15" />
<link rel="stylesheet" href="../components/topnav.css" />
<link rel="stylesheet" href="../components/buttons.css" />
<link rel="stylesheet" href="../components/badges.css" />
<link rel="stylesheet" href="../components/inputs.css" />
<link rel="stylesheet" href="../components/status_banner.css" />
<link rel="stylesheet" href="../components/table.css" />
<link rel="stylesheet" href="../components/floater_button.css" />
<script defer src="../components/sidebar.js"></script>
<style>
  html, body { margin: 0; background: #fff; }
  body { font-family: var(--font-display); color: var(--fg-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .shell { min-height: 100vh; display: flex; flex-direction: column; background: #fff; }
  .body { display: flex; flex: 1; min-height: 0; align-items: stretch; }
  .body > [data-oms-sidebar] { align-self: stretch; display: flex; flex-direction: column; }
  .body > [data-oms-sidebar] > .oms-sidebar { flex: 1; height: auto; }
  .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main { flex: 1; padding: 32px 36px 24px; display: flex; flex-direction: column; gap: 28px; background: #fff; }
  .main .oms-table, .main .oms-table__slot, .main .oms-table__scroll, .main .oms-table__grid { width: 100%; }
  .page-title { font-family: var(--font-display); font-weight: 700; font-size: 40px; line-height: 1.2; color: var(--slate-950); margin: 0; letter-spacing: -0.01em; }

  /* Tabs — underline style */
  .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--slate-200); width: 100%; }
  .tab {
    appearance: none; background: transparent; border: 0;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    padding: 8px 16px; font-family: var(--font-display);
    font-weight: 500; font-size: 15px; color: var(--slate-950);
    cursor: pointer; border-radius: 6px 6px 0 0;
  }
  .tab:hover { background: var(--slate-50); }
  .tab.is-active { font-weight: 700; border-bottom-color: #670DE5; }

  .section-title { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--slate-950); margin: 0; letter-spacing: -0.005em; }

  /* Wallet cell */
  .wallet-id { display: inline-flex; align-items: center; gap: 8px; }
  .wallet-id__copy { background: none; border: 0; padding: 0; color: var(--slate-400); cursor: pointer; display: inline-flex; }
  .wallet-id__copy svg { width: 16px; height: 16px; stroke-width: 1.75; }
  .wallet-id__copy:hover { color: var(--slate-700); }
  .wallet-type { display: inline-flex; align-items: center; gap: 8px; }
  .wallet-type svg { width: 16px; height: 16px; stroke-width: 1.75; color: var(--slate-500); }
  .head-info { display: inline-flex; align-items: center; gap: 4px; }
  .head-info svg { width: 14px; height: 14px; stroke-width: 1.75; color: var(--slate-500); }

  /* All table text at 14px */
  .oms-table__grid th,
  .oms-table__grid td,
  .oms-table__grid .oms-table__head-label,
  .oms-table__grid .oms-table__cell-text,
  .oms-table__grid .oms-badge { font-size: 14px; }
</style>
</head>
<body>
<div class="shell" data-screen-label="Wallets">

  <div class="oms-status-banner" data-mode="sandbox" data-oms-status-banner>
    <span class="oms-status-banner__mode" data-oms-status-banner-mode>Sandbox mode</span>
    <span class="oms-status-banner__msg" data-oms-status-banner-msg>You are testing OMS capabilities in a sandbox environment</span>
    <span class="oms-status-banner__action">
      <button class="btn btn-sm btn-secondary" data-oms-status-banner-action>Switch to live</button>
    </span>
  </div>

  <div class="body">
    <div data-oms-sidebar data-active="Wallets" data-assets-base="../assets"></div>

    <div class="main-col">
      <nav class="oms-topnav" aria-label="Top navigation">
        <div class="oms-topnav__right">
          <div class="oms-topnav__menu">
            <a href="#" class="oms-topnav__item">
              <span class="oms-topnav__item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
              </span><span>Menu Item</span>
            </a>
          </div>
          <a href="#" class="oms-topnav__profile">
            <span class="oms-topnav__profile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"></path></svg>
            </span><span>User Name</span>
          </a>
        </div>
      </nav>

      <main class="main">
        <h1 class="page-title">Wallets</h1>

        <nav class="tabs" role="tablist">
          <button class="tab is-active" role="tab" aria-selected="true">Custodial</button>
          <button class="tab" role="tab" aria-selected="false">Non custodial</button>
          <button class="tab" role="tab" aria-selected="false">External</button>
        </nav>

        <section class="oms-table" data-screen-label="Wallets table">
          <div class="oms-table__controls">
            <h2 class="section-title">Transactions</h2>
            <div class="oms-table__controls-actions">
              <label class="oms-table__search">
                <svg class="oms-table__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg>
                <input type="text" placeholder="Search" />
              </label>
              <button class="oms-table__icon-btn" aria-label="Filter">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
              </button>
              <button class="oms-table__icon-btn" aria-label="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </button>
            </div>
          </div>

          <div class="oms-table__slot">
            <div class="oms-table__scroll">
              <table class="oms-table__grid">
                <thead><tr id="thead"></tr></thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <button class="oms-floater oms-floater--fixed" aria-label="Contact support">
    <span class="oms-floater__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a9 9 0 0 1 18 0v9a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"></path></svg></span>
  </button>
</div>

<script>
  const copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  const lockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>';
  const infoIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';

  const HEADERS = [
    { label: "Wallet" },
    { label: "Balance", info: true },
    { label: "Type" },
    { label: "Created" },
  ];
  const ROWS = [
    { wallet: "wal_a124…5tg", balance: "$478.50",   type: "Custodial", created: "Jan 30, 2026" },
    { wallet: "wal_a124…5tg", balance: "$582.00",   type: "Custodial", created: "Dec 5, 2025" },
    { wallet: "0xCc51…77E42", balance: "$1,157.50", type: "Custodial", created: "Nov 12, 2025" },
    { wallet: "wal_a124…5tg", balance: "$2,231.00", type: "Custodial", created: "Oct 20, 2025" },
    { wallet: "0xCc51…77E42", balance: "$916.00",   type: "Custodial", created: "Sep 1, 2025" },
  ];

  document.getElementById('thead').innerHTML = HEADERS.map(h =>
    `<th><span class="oms-table__head-label">${h.info ? `<span class="head-info">${h.label}${infoIcon}</span>` : h.label}</span></th>`
  ).join('');

  const cWallet = w => `<td><div class="oms-table__cell"><span class="wallet-id"><span class="oms-table__cell-text">${w}</span><button class="wallet-id__copy" aria-label="Copy wallet ID">${copyIcon}</button></span></div></td>`;
  const cPlain  = t => `<td><div class="oms-table__cell"><span class="oms-table__cell-text">${t}</span></div></td>`;
  const cType   = t => `<td><div class="oms-table__cell"><span class="wallet-type">${lockIcon}<span class="oms-table__cell-text">${t}</span></span></div></td>`;

  document.getElementById('tbody').innerHTML = ROWS.map(r =>
    `<tr>${cWallet(r.wallet)}${cPlain(r.balance)}${cType(r.type)}${cPlain(r.created)}</tr>`
  ).join('');

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(o => { o.classList.remove('is-active'); o.setAttribute('aria-selected','false'); });
    t.classList.add('is-active'); t.setAttribute('aria-selected','true');
  }));

  function setMode(mode){const banner=document.querySelector('[data-oms-status-banner]');if(!banner)return;banner.setAttribute('data-mode',mode);const m=banner.querySelector('[data-oms-status-banner-mode]'),s=banner.querySelector('[data-oms-status-banner-msg]'),a=banner.querySelector('[data-oms-status-banner-action]');if(mode==='live'){m.textContent='Live mode';s.textContent='You are operating in the live OMS environment — real funds and customers';a.textContent='Switch to sandbox';}else{m.textContent='Sandbox mode';s.textContent='You are testing OMS capabilities in a sandbox environment';a.textContent='Switch to live';}const t=document.querySelector('[data-oms-mode-toggle]');if(t){t.querySelectorAll('.oms-mode-toggle__opt').forEach((o,i)=>{const on=(i===0&&mode==='sandbox')||(i===1&&mode==='live');o.classList.toggle('is-active',on);o.setAttribute('aria-selected',String(on));});t.classList.toggle('oms-mode-toggle--live',mode==='live');}}
  function wireToggle(){const t=document.querySelector('[data-oms-mode-toggle]');if(!t||t.__w)return false;t.__w=true;t.addEventListener('click',e=>{const o=e.target.closest('.oms-mode-toggle__opt');if(!o)return;const i=[...t.querySelectorAll('.oms-mode-toggle__opt')].indexOf(o);setMode(i===1?'live':'sandbox');});return true;}
  if(!wireToggle()){const mo=new MutationObserver(()=>{if(wireToggle())mo.disconnect();});mo.observe(document.body,{childList:true,subtree:true});}
  document.addEventListener('click',e=>{const b=e.target.closest('[data-oms-status-banner-action]');if(!b)return;const cur=document.querySelector('[data-oms-status-banner]').getAttribute('data-mode');setMode(cur==='live'?'sandbox':'live');});
</script>
</body>
</html>
