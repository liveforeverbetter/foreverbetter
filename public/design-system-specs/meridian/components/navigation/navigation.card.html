<!-- @dsCard group="Components" viewport="700x460" name="Navigation" subtitle="Tab bar, top nav, sidebar, list items, menu items & tabs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:20px}
  .wrap{display:grid;grid-template-columns:250px 1fr;gap:20px;align-items:start}
  .phone{width:300px;border:1px solid var(--border-subtle);border-radius:24px;overflow:hidden;background:var(--surface-page)}
  .col{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { Sidebar, TopNav, TabBar, ListItem, MenuItem, Tabs, Icon, Badge, Card } = M;
function Demo(){
  const [nav,setNav]=React.useState('sleep');
  const [tab,setTab]=React.useState('home');
  const [seg,setSeg]=React.useState('week');
  return (
    <div>
      <div className="wrap">
        <div style={{height:420}}>
          <Sidebar value={nav} onChange={setNav} items={[
            {value:'overview',label:'Overview',icon:<Icon name="layout-dashboard" size={18}/>},
            {section:'Body'},
            {value:'sleep',label:'Sleep',icon:<Icon name="moon" size={18}/>},
            {value:'recovery',label:'Recovery',icon:<Icon name="heart-pulse" size={18}/>,badge:<Badge tone="success" size="sm">88</Badge>},
            {value:'strain',label:'Strain',icon:<Icon name="activity" size={18}/>},
            {section:'Plan'},
            {value:'coach',label:'Coaching',icon:<Icon name="sparkles" size={18}/>},
          ]}/>
        </div>
        <div className="col">
          <div className="phone">
            <TopNav user={{name:'Blake Sun',tone:'warm'}} date="TODAY" battery={68} />
          </div>
          <Card padding="sm">
            <ListItem icon={<Icon name="moon" size={20}/>} iconTone="sleep" title="Tonight's Sleep" subtitle="Recommended 11:47 PM" chevron divider/>
            <ListItem icon={<Icon name="heart-pulse" size={20}/>} iconTone="recovery" title="Recovery" subtitle="Green — ready to train" trailing="88%" chevron/>
          </Card>
          <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
            <Tabs value={seg} onChange={setSeg} variant="segmented" items={[{value:'day',label:'Day'},{value:'week',label:'Week'},{value:'month',label:'Month'}]}/>
          </div>
          <Card padding="sm" style={{width:220}}>
            <MenuItem icon={<Icon name="pencil" size={16}/>} label="Edit plan" shortcut="⌘E"/>
            <MenuItem icon={<Icon name="share-2" size={16}/>} label="Share" selected/>
            <MenuItem icon={<Icon name="trash-2" size={16}/>} label="Delete" danger/>
          </Card>
        </div>
      </div>
      <div className="phone" style={{marginTop:18,width:340}}>
        <TabBar value={tab} onChange={setTab} orb={{glyph:'M'}} items={[
          {value:'home',label:'Home',icon:'home'},{value:'health',label:'Health',icon:'health'},
          {value:'community',label:'Community',icon:'community'},{value:'more',label:'More',icon:'more'}]}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
