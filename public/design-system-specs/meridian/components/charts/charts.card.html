<!-- @dsCard group="Charts" viewport="700x360" name="Trends & sparklines" subtitle="Time-series line with area fill and optimal band, plus inline sparklines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
  .card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:16px;padding:18px;margin-bottom:16px}
  .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .ttl{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary)}
  .big{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:-.02em;color:var(--text-primary)}
  .row{display:flex;gap:12px}
  .tile{flex:1;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary)}
  .val{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--text-primary)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { TrendChart, Sparkline } = M;
function Demo(){
  return (
    <div>
      <div className="card">
        <div className="hd"><span className="ttl">Recovery · 7 days</span><span className="big">66%</span></div>
        <TrendChart channel="recovery" height={150} min={40} max={90} band={[60,80]}
          data={[62,58,71,65,60,74,66]} labels={['Sat','Sun','Mon','Tue','Wed','Thu','Fri']}/>
      </div>
      <div className="row">
        <div className="tile"><span className="lbl">HRV</span><span className="val">85</span><Sparkline channel="recovery" data={[70,74,68,80,76,88,85]} width={110}/></div>
        <div className="tile"><span className="lbl">Strain</span><span className="val">5.1</span><Sparkline channel="strain" data={[4,6,3,7,5,8,5]} width={110}/></div>
        <div className="tile"><span className="lbl">Sleep</span><span className="val">88%</span><Sparkline channel="sleep" data={[80,84,79,90,86,92,88]} width={110}/></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
