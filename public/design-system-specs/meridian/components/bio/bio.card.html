<!-- @dsCard group="Bio" viewport="700x560" name="Biomarker & genetic data" subtitle="Range bars, lab panels, genetic trait cards, genotype chips & risk meters" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { BiomarkerPanel, BiomarkerRow, GeneCard, GenotypeChip, RiskMeter, Button, Icon } = M;
function Demo(){
  return (
    <div className="cols">
      <div className="stack">
        <BiomarkerPanel name="Metabolic & Lipids" collected="Jul 2, 2026" inRange={3} total={4}
          action={<Button size="sm" variant="secondary" iconLeft={<Icon name="file-text" size={15}/>}>Full report</Button>}>
          <BiomarkerRow name="ApoB" value={78} unit="mg/dL" status="optimal" min={40} max={130} optimalLow={40} optimalHigh={90} delta="6" deltaTone="down"/>
          <BiomarkerRow name="Fasting Glucose" value={97} unit="mg/dL" status="high" min={70} max={110} optimalLow={74} optimalHigh={95} delta="3" deltaTone="up"/>
          <BiomarkerRow name="HDL" value={62} unit="mg/dL" status="optimal" min={30} max={90} optimalLow={50} optimalHigh={90}/>
          <BiomarkerRow name="hs-CRP" value={0.4} unit="mg/L" status="optimal" min={0} max={3} optimalLow={0} optimalHigh={1} showRange={false} style={{borderBottom:'none'}}/>
        </BiomarkerPanel>
      </div>
      <div className="stack">
        <GeneCard tag="Metabolism" trait="Caffeine Clearance" gene="CYP1A2" genotype="AA" effect="protective"
          summary="You clear caffeine quickly. Afternoon coffee is unlikely to disrupt your sleep." level="reduced" riskCaption="Fast metabolizer"/>
        <GeneCard tag="Cardio-metabolic" trait="Type 2 Diabetes" gene="TCF7L2" genotype="CT" effect="risk"
          summary="Your polygenic score sits slightly above typical. Protein-forward meals and Zone 2 work help most." level="increased" riskCaption="Slightly increased"/>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <GenotypeChip genotype="AG" effect="protective"/>
          <GenotypeChip genotype="GG" effect="neutral"/>
          <GenotypeChip genotype="CT" effect="risk"/>
          <GenotypeChip genotype="TT" effect="highRisk"/>
        </div>
        <div style={{background:'var(--surface-card)',border:'1px solid var(--border-subtle)',borderRadius:'var(--radius-lg)',padding:18}}>
          <RiskMeter level="reduced" label="Cardiovascular risk" caption="Reduced"/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
