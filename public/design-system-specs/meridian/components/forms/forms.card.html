<!-- @dsCard group="Components" viewport="700x400" name="Forms & inputs" subtitle="Text fields, selects, checkboxes, radios, switches, sliders & code entry" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 28px;align-items:start}
  .stack{display:flex;flex-direction:column;gap:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { Input, Select, Checkbox, Radio, RadioGroup, Switch, Slider, CodeInput, Icon } = M;
function Demo(){
  const [pace,setPace]=React.useState(0.2);
  const [code,setCode]=React.useState('418');
  const [chk,setChk]=React.useState(true);
  const [alarm,setAlarm]=React.useState(true);
  const [goal,setGoal]=React.useState('slow');
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Email" defaultValue="blake@meridian.app" iconLeft={<Icon name="mail" size={16}/>}/>
        <Input label="Resting HR" placeholder="bpm" iconLeft={<Icon name="heart-pulse" size={16}/>} error="Enter a value between 40–100"/>
        <Select label="Primary goal" value={goal==='slow'?'sleep':'strain'} options={[{value:'sleep',label:'Sleep better'},{value:'strain',label:'Train harder'},{value:'stress',label:'Lower stress'}]}/>
      </div>
      <div className="stack">
        <Checkbox checked={chk} onChange={setChk} label="7:00+ hours of sleep" description="Counts toward today's plan"/>
        <RadioGroup value={goal} onChange={setGoal} options={[{value:'slow',label:'Slow pace',description:'Sustainable habits'},{value:'fast',label:'Fast pace'}]}/>
        <Switch checked={alarm} onChange={setAlarm} label="Smart alarm"/>
      </div>
      <div className="stack">
        <span style={{fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-tertiary)'}}>Pace of aging</span>
        <Slider value={pace} min={-1} max={3} step={0.1} ticks={41} valueLabel={pace.toFixed(1)+'x'} leftLabel="Slow" rightLabel="Fast" onChange={setPace}/>
      </div>
      <div className="stack">
        <span style={{fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--text-tertiary)'}}>Verification code</span>
        <CodeInput length={6} value={code} onChange={setCode}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
