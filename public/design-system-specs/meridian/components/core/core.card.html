<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);width:100%;margin-bottom:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { Button, Badge, IconButton, Avatar, Card, CardHeader, Separator, Icon } = M;
function Demo(){
  return (
    <div>
      <div className="row"><span className="lbl">Buttons</span>
        <Button variant="primary">Start activity</Button>
        <Button variant="secondary" iconLeft={<Icon name="plus" size={16}/>}>Add activity</Button>
        <Button variant="subtle">View plan</Button>
        <Button variant="ghost">Skip</Button>
        <Button variant="danger">Delete</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="row"><span className="lbl">Sizes & pill</span>
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg">Large</Button>
        <Button pill variant="secondary" iconLeft={<Icon name="sparkles" size={16}/>}>Customize</Button>
      </div>
      <div className="row"><span className="lbl">Badges</span>
        <Badge tone="success" dot>In range</Badge>
        <Badge tone="warning">Medium</Badge>
        <Badge tone="danger" dot>Low</Badge>
        <Badge tone="info">Strain 5.1</Badge>
        <Badge tone="sleep">Sleep</Badge>
        <Badge tone="brand" variant="solid">Pro</Badge>
        <Badge tone="neutral">2/7</Badge>
      </div>
      <div className="row"><span className="lbl">Icon buttons & avatars</span>
        <IconButton aria-label="add" variant="subtle"><Icon name="plus"/></IconButton>
        <IconButton aria-label="more" variant="ghost"><Icon name="ellipsis"/></IconButton>
        <IconButton aria-label="edit" variant="outline"><Icon name="pencil"/></IconButton>
        <IconButton aria-label="go" variant="solid"><Icon name="arrow-right"/></IconButton>
        <Separator orientation="vertical" style={{height:32}}/>
        <Avatar name="Blake Sun" tone="warm"/>
        <Avatar name="Ivy Ko" tone="violet" ring/>
        <Avatar name="Meridian" tone="brand" size={32}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
