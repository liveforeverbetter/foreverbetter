<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  .contain{position:relative;transform:translateZ(0);height:220px;border:1px solid var(--border-subtle);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface-inset)}
  .stack{display:flex;flex-direction:column;gap:16px}
  .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { Modal, Drawer, Toast, StatusBanner, Tooltip, EmptyState, Spinner, Skeleton, ContextMenu, ProgressBar, Button, Icon, Badge } = M;
function Demo(){
  return (
    <div className="stack">
      <div className="grid">
        <div className="contain">
          <Modal open title="Set smart alarm" subtitle="We'll wake you in your lightest sleep phase before 7:05 AM." onClose={()=>{}} width={340}
            footer={<><Button variant="ghost" size="sm">Cancel</Button><Button size="sm">Set alarm</Button></>}>
            <div style={{color:'var(--text-secondary)',fontSize:14}}>Latest wake time</div>
          </Modal>
        </div>
        <div className="contain">
          <Drawer open side="bottom" title="Add activity" onClose={()=>{}}>
            <div className="stack">
              <div style={{display:'flex',gap:10}}><Badge tone="strain">Strength</Badge><Badge tone="info">Run</Badge><Badge tone="sleep">Nap</Badge></div>
              <Button block>Start activity</Button>
            </div>
          </Drawer>
        </div>
      </div>
      <StatusBanner tone="warning" title="Lower HRV Today" icon={<Icon name="activity" size={20}/>}
        action={<Button size="sm" variant="secondary">See recovery</Button>}>
        Your HRV is 7% lower than usual, landing you a yellow Recovery. Yellow means your body is functioning normally — but your HRV trends are worth watching.
      </StatusBanner>
      <div className="grid">
        <div className="stack">
          <Toast tone="success" title="Saved" message="Your plan was updated." onClose={()=>{}}/>
          <ProgressBar value={57} label="Custom plan" showValue tone="brand" height={8}/>
          <div style={{display:'flex',gap:20,alignItems:'center'}}>
            <Spinner size={26}/>
            <div style={{flex:1}}><Skeleton width="100%" height={12} style={{marginBottom:8}}/><Skeleton width="60%" height={12}/></div>
            <Tooltip label="Heart rate variability"><span style={{color:'var(--text-secondary)',display:'flex'}}><Icon name="info" size={18}/></span></Tooltip>
          </div>
        </div>
        <div className="stack">
          <ContextMenu items={[
            {icon:<Icon name="pencil" size={16}/>,label:'Edit plan',shortcut:'⌘E'},
            {icon:<Icon name="share-2" size={16}/>,label:'Share',selected:true},
            {separator:true},
            {icon:<Icon name="trash-2" size={16}/>,label:'Delete',danger:true},
          ]}/>
          <EmptyState icon={<Icon name="calendar-plus" size={26}/>} title="No activities yet"
            description="Log a workout or let auto-detect find one." action={<Button size="sm" variant="secondary">Add activity</Button>}/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
