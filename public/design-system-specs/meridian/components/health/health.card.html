<!-- @dsCard group="Health" viewport="700x560" name="Health metrics" subtitle="Metric rings, stat tiles, activity rows, plan items, journal & healthspan orb" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:24px}
  .cols{display:grid;grid-template-columns:1.1fr 1fr;gap:26px;align-items:start}
  .rings{display:flex;gap:14px;justify-content:space-between;margin-bottom:20px}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .stack{display:flex;flex-direction:column;gap:12px}
  .plan{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:18px 18px 8px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = window.MeridianDesignSystem_0f3f3a;
const { MetricRing, MetricCard, StatTile, ActivityRow, InsightCard, JournalWeek, PlanItem, HealthspanOrb, Icon, ProgressBar } = M;
function Demo(){
  return (
    <div className="cols">
      <div>
        <div className="rings">
          <MetricRing channel="sleep" value={88} unit="%" label="Sleep"/>
          <MetricRing channel="stress" value={65} unit="%" label="Recovery"/>
          <MetricRing channel="strain" value={5.1} max={21} display="5.1" label="Strain"/>
        </div>
        <div className="tiles">
          <StatTile icon={<Icon name="heart-pulse" size={16}/>} iconTone="recovery" label="HRV" value={85} secondary="91 base" delta="4" deltaTone="up"/>
          <StatTile icon={<Icon name="heart" size={16}/>} iconTone="strain" label="RHR" value={52} unit="bpm" delta="1" deltaTone="down"/>
        </div>
        <div className="stack">
          <ActivityRow icon="moon" channel="sleep" duration="6:37" label="Sleep" start="11:32 PM" end="6:54 AM"/>
          <InsightCard icon={<Icon name="sun" size={18}/>} iconTone="brand" title="Your Daily Outlook" onClick={()=>{}}/>
        </div>
        <div className="plan" style={{marginTop:16}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-secondary)'}}>Custom Plan · 3 days left</span>
          </div>
          <ProgressBar value={57} showValue valueLabel="57% accomplished" height={8} style={{marginBottom:6}}/>
          <PlanItem label="4,500+ Steps" current={2} target={7}/>
          <PlanItem label="7:00+ Hours of Sleep" current={0} target={7}/>
          <PlanItem label="Strength Training" current={2} target={2}/>
        </div>
      </div>
      <div className="stack" style={{alignItems:'center'}}>
        <HealthspanOrb value="40.7" label="BIO AGE" caption="9.2 years younger" tone="good" size={280}/>
        <div className="plan" style={{width:'100%',paddingBottom:18}}>
          <span style={{fontSize:12,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--text-secondary)'}}>My Journal</span>
          <JournalWeek style={{marginTop:14}} days={[
            {label:'SAT',state:'complete'},{label:'SUN',state:'complete'},{label:'MON',state:'missed'},
            {label:'TUE',state:'complete'},{label:'WED',state:'partial'},{label:'THU',state:'complete'},{label:'FRI',state:'today'}
          ]}/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
