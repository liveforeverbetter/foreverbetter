<!-- @dsCard group="Colors" viewport="700x170" name="Performance channels" subtitle="Recovery · Strain · Sleep · Stress — the metric data hues" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.chip{border-radius:12px;padding:16px;background:var(--surface-card);border:1px solid var(--border-subtle)}
.dot{width:44px;height:44px;border-radius:50%;margin-bottom:12px}
.name{font-size:13px;font-weight:700;color:var(--text-primary);letter-spacing:.04em;text-transform:uppercase}
.hex{font-size:11px;color:var(--text-tertiary);font-variant-numeric:tabular-nums;margin-top:2px}
</style></head><body>
<div class="chip"><div class="dot" style="background:var(--metric-recovery);box-shadow:var(--glow-recovery)"></div><div class="name" style="color:var(--green-400)">Recovery</div><div class="hex">#34E08A</div></div>
<div class="chip"><div class="dot" style="background:var(--metric-strain);box-shadow:var(--glow-strain)"></div><div class="name" style="color:var(--strain-400)">Strain</div><div class="hex">#3BB6F5</div></div>
<div class="chip"><div class="dot" style="background:var(--metric-sleep);box-shadow:var(--glow-sleep)"></div><div class="name" style="color:var(--sleep-400)">Sleep</div><div class="hex">#8A9BFF</div></div>
<div class="chip"><div class="dot" style="background:var(--metric-stress)"></div><div class="name" style="color:var(--amber-400)">Stress</div><div class="hex">#FFD23F</div></div>
</body></html>
