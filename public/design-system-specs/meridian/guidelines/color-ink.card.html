<!-- @dsCard group="Colors" viewport="700x170" name="Ink — Neutral canvas" subtitle="Near-black surfaces → near-white text, 16 steps" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px}
.row{display:flex;gap:0}
.sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border-right:1px solid rgba(255,255,255,.04)}
.sw span{font-size:10px;font-weight:600;color:rgba(255,255,255,.55)}
.sw.lt span{color:rgba(0,0,0,.5)}
.sw:first-child{border-radius:8px 0 0 8px}.sw:last-child{border-radius:0 8px 8px 0;border-right:none}
</style></head><body>
<div class="row">
<div class="sw" style="background:var(--ink-1000)"><span>1000</span></div>
<div class="sw" style="background:var(--ink-950)"><span>950</span></div>
<div class="sw" style="background:var(--ink-900)"><span>900</span></div>
<div class="sw" style="background:var(--ink-850)"><span>850</span></div>
<div class="sw" style="background:var(--ink-800)"><span>800</span></div>
<div class="sw" style="background:var(--ink-700)"><span>700</span></div>
<div class="sw" style="background:var(--ink-600)"><span>600</span></div>
<div class="sw" style="background:var(--ink-500)"><span>500</span></div>
<div class="sw" style="background:var(--ink-400)"><span>400</span></div>
<div class="sw" style="background:var(--ink-300)"><span>300</span></div>
<div class="sw lt" style="background:var(--ink-200)"><span>200</span></div>
<div class="sw lt" style="background:var(--ink-100)"><span>100</span></div>
<div class="sw lt" style="background:var(--ink-50)"><span>50</span></div>
</div>
</body></html>
