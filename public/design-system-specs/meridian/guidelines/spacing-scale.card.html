<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid · 4 → 96" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:24px;display:flex;align-items:flex-end;gap:16px}
.u{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{background:var(--grad-brand);border-radius:3px;width:var(--w)}
.lbl{font-size:11px;color:var(--text-secondary);font-weight:600;font-variant-numeric:tabular-nums}
.px{font-size:10px;color:var(--text-tertiary)}
</style></head><body>
<div class="u"><div class="bar" style="--w:4px;height:16px"></div><span class="lbl">1</span><span class="px">4</span></div>
<div class="u"><div class="bar" style="--w:8px;height:24px"></div><span class="lbl">2</span><span class="px">8</span></div>
<div class="u"><div class="bar" style="--w:12px;height:32px"></div><span class="lbl">3</span><span class="px">12</span></div>
<div class="u"><div class="bar" style="--w:16px;height:40px"></div><span class="lbl">4</span><span class="px">16</span></div>
<div class="u"><div class="bar" style="--w:20px;height:48px"></div><span class="lbl">5</span><span class="px">20</span></div>
<div class="u"><div class="bar" style="--w:24px;height:56px"></div><span class="lbl">6</span><span class="px">24</span></div>
<div class="u"><div class="bar" style="--w:32px;height:64px"></div><span class="lbl">7</span><span class="px">32</span></div>
<div class="u"><div class="bar" style="--w:40px;height:72px"></div><span class="lbl">8</span><span class="px">40</span></div>
<div class="u"><div class="bar" style="--w:48px;height:80px"></div><span class="lbl">9</span><span class="px">48</span></div>
<div class="u"><div class="bar" style="--w:64px;height:88px"></div><span class="lbl">10</span><span class="px">64</span></div>
</body></html>
