<!-- @dsCard group="Colors" viewport="700x170" name="Surfaces & text" subtitle="Elevation stack and the text hierarchy on a dark canvas" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px;display:grid;grid-template-columns:1.1fr 1fr;gap:20px;align-items:center}
.surf{display:flex;gap:10px}
.tile{flex:1;height:88px;border-radius:12px;border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:10px;font-size:11px;font-weight:600;color:var(--text-tertiary)}
.txt div{margin-bottom:8px}
.p{color:var(--text-primary);font-size:18px;font-weight:600}
.s{color:var(--text-secondary);font-size:15px}
.t{color:var(--text-tertiary);font-size:14px}
.d{color:var(--text-disabled);font-size:14px}
.b{color:var(--text-brand);font-size:14px;font-weight:600}
</style></head><body>
<div class="surf">
<div class="tile" style="background:var(--surface-page)">page</div>
<div class="tile" style="background:var(--surface-card)">card</div>
<div class="tile" style="background:var(--surface-card-raised)">raised</div>
<div class="tile" style="background:var(--surface-overlay)">overlay</div>
</div>
<div class="txt">
<div class="p">Primary — headlines & values</div>
<div class="s">Secondary — labels & captions</div>
<div class="t">Tertiary — metadata, hints</div>
<div class="d">Disabled — inactive</div>
<div class="b">Brand link — mint-400</div>
</div>
</body></html>
