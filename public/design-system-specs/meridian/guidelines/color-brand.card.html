<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Electric Mint" subtitle="Recovery-green lineage; brand primary is mint-500" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px;display:flex;gap:0}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.sw span{font-size:11px;font-weight:600;color:rgba(0,0,0,.55)}
.sw small{font-size:10px;color:rgba(0,0,0,.4);font-variant-numeric:tabular-nums}
.sw.d span,.sw.d small{color:rgba(255,255,255,.7)}
.sw:first-child{border-radius:8px 0 0 8px}.sw:last-child{border-radius:0 8px 8px 0}
</style></head><body>
<div class="sw" style="background:var(--mint-100)"><span>100</span><small>#C7FBE6</small></div>
<div class="sw" style="background:var(--mint-200)"><span>200</span><small>#8CF6C9</small></div>
<div class="sw" style="background:var(--mint-300)"><span>300</span><small>#4DEFA9</small></div>
<div class="sw" style="background:var(--mint-400)"><span>400</span><small>#22E68F</small></div>
<div class="sw" style="background:var(--mint-500);box-shadow:0 0 0 2px var(--surface-page),0 0 0 4px var(--mint-500)"><span>500 ★</span><small>#12D982</small></div>
<div class="sw d" style="background:var(--mint-600)"><span>600</span><small>#0FB86E</small></div>
<div class="sw d" style="background:var(--mint-700)"><span>700</span><small>#0C8E55</small></div>
</body></html>
