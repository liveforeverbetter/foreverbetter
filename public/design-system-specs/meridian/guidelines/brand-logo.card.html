<!-- @dsCard group="Brand" viewport="700x200" name="Logo & mark" subtitle="Concentric-ring mark + Metropolis wordmark. No supplied logo, so this is an original placeholder." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary);padding:30px;display:flex;align-items:center;gap:48px}
.wm{display:flex;align-items:center;gap:16px}
.name{font-family:var(--font-display);font-weight:700;font-size:38px;letter-spacing:-1.4px}
.on-brand{background:var(--mint-500);border-radius:16px;padding:22px 26px;display:flex;align-items:center;gap:14px}
.on-brand .name{color:var(--text-inverse);font-size:26px}
.cap{font-size:11px;color:var(--text-tertiary);margin-top:14px}
</style></head><body>
<div>
<div class="wm">
<svg width="60" height="60" viewBox="0 0 120 120" fill="none" style="color:var(--text-primary)">
<circle cx="60" cy="60" r="46" stroke="currentColor" stroke-opacity="0.18" stroke-width="8"/>
<path d="M60 14 a46 46 0 0 1 40.6 68.4" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
<circle cx="60" cy="60" r="24" stroke="currentColor" stroke-opacity="0.18" stroke-width="8"/>
<path d="M60 36 a24 24 0 0 1 12 44.8" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
<defs><linearGradient id="g" x1="20" y1="14" x2="104" y2="106" gradientUnits="userSpaceOnUse"><stop stop-color="#12D982"/><stop offset="1" stop-color="#0E9DE8"/></linearGradient></defs>
</svg>
<span class="name">MERIDIAN</span>
</div>
<div class="cap">Mark inherits currentColor for the track; the arc always uses the brand gradient.</div>
</div>
<div class="on-brand">
<svg width="34" height="34" viewBox="0 0 120 120" fill="none" style="color:rgba(7,9,12,.85)">
<circle cx="60" cy="60" r="46" stroke="currentColor" stroke-opacity="0.25" stroke-width="9"/>
<path d="M60 14 a46 46 0 0 1 40.6 68.4" stroke="#07090C" stroke-width="9" stroke-linecap="round"/>
<circle cx="60" cy="60" r="24" stroke="currentColor" stroke-opacity="0.25" stroke-width="9"/>
</svg>
<span class="name">MERIDIAN</span>
</div>
</body></html>
