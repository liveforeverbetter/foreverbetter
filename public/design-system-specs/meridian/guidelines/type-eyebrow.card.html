<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & tabular figures" subtitle="Uppercase +0.1em labels; tabular-nums for all data readouts" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:24px;color:var(--text-primary);display:flex;gap:40px;align-items:center}
.eb{font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px}
.nav{display:flex;gap:22px}
.nav span{font-size:15px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary)}
.nav span.on{color:var(--text-primary)}
.num{font-weight:700;font-size:34px;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.m{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px}
</style></head><body>
<div>
<div class="m">Eyebrow / nav · 13–15 · +0.1em</div>
<div class="eb">Today's activities</div>
<div class="nav"><span class="on">Sleep</span><span>Recovery</span><span>Strain</span></div>
</div>
<div>
<div class="m">Tabular figures</div>
<div class="num">11:47&nbsp;&nbsp;88%&nbsp;&nbsp;5.1</div>
</div>
</body></html>
