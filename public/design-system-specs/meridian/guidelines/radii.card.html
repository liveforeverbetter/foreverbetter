<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:24px;display:flex;gap:16px;align-items:center}
.u{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:76px;height:60px;background:var(--surface-card-raised);border:1px solid var(--border-default)}
.lbl{font-size:11px;color:var(--text-secondary);font-weight:600}
.px{font-size:10px;color:var(--text-tertiary)}
</style></head><body>
<div class="u"><div class="box" style="border-radius:4px"></div><span class="lbl">xs</span><span class="px">4</span></div>
<div class="u"><div class="box" style="border-radius:8px"></div><span class="lbl">sm</span><span class="px">8</span></div>
<div class="u"><div class="box" style="border-radius:12px"></div><span class="lbl">md</span><span class="px">12</span></div>
<div class="u"><div class="box" style="border-radius:16px"></div><span class="lbl">lg</span><span class="px">16</span></div>
<div class="u"><div class="box" style="border-radius:20px"></div><span class="lbl">xl</span><span class="px">20</span></div>
<div class="u"><div class="box" style="border-radius:28px"></div><span class="lbl">2xl</span><span class="px">28</span></div>
<div class="u"><div class="box" style="border-radius:999px"></div><span class="lbl">pill</span><span class="px">∞</span></div>
</body></html>
