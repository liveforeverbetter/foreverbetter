<!-- @dsCard group="Colors" viewport="700x160" name="Status semantics" subtitle="Foreground + tinted background pairs for success / warning / danger / info" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.chip{border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.pill{align-self:flex-start;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px}
.lbl{font-size:12px;font-weight:600;color:var(--text-secondary)}
.hex{font-size:10px;color:var(--text-tertiary);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="chip" style="background:var(--status-success-bg)"><span class="pill" style="background:var(--green-400);color:var(--text-inverse)">Success</span><span class="lbl">In range</span><span class="hex">fg #34E08A</span></div>
<div class="chip" style="background:var(--status-warning-bg)"><span class="pill" style="background:var(--amber-400);color:var(--text-inverse)">Warning</span><span class="lbl">Medium</span><span class="hex">fg #FFD23F</span></div>
<div class="chip" style="background:var(--status-danger-bg)"><span class="pill" style="background:var(--red-400);color:#fff">Danger</span><span class="lbl">Low / alert</span><span class="hex">fg #FF5A6E</span></div>
<div class="chip" style="background:var(--status-info-bg)"><span class="pill" style="background:var(--strain-400);color:var(--text-inverse)">Info</span><span class="lbl">Neutral note</span><span class="hex">fg #3BB6F5</span></div>
</body></html>
