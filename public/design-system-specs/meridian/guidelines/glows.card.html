<!-- @dsCard group="Spacing" viewport="700x180" name="Metric glows" subtitle="Colored ambient halos signal live data by channel" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:30px;display:flex;gap:34px;align-items:center;justify-content:center}
.u{display:flex;flex-direction:column;align-items:center;gap:16px}
.ring{width:66px;height:66px;border-radius:50%;border:6px solid}
.lbl{font-size:11px;color:var(--text-secondary);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
</style></head><body>
<div class="u"><div class="ring" style="border-color:var(--metric-recovery);box-shadow:var(--glow-recovery)"></div><span class="lbl">Recovery</span></div>
<div class="u"><div class="ring" style="border-color:var(--metric-strain);box-shadow:var(--glow-strain)"></div><span class="lbl">Strain</span></div>
<div class="u"><div class="ring" style="border-color:var(--metric-sleep);box-shadow:var(--glow-sleep)"></div><span class="lbl">Sleep</span></div>
<div class="u"><div class="ring" style="border-color:var(--mint-500);box-shadow:var(--glow-brand)"></div><span class="lbl">Brand</span></div>
</body></html>
