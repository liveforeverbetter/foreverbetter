<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Ambient shadows on a near-black canvas — card → overlay → pop" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:28px;display:flex;gap:26px;align-items:center}
.u{display:flex;flex-direction:column;align-items:center;gap:12px}
.box{width:110px;height:74px;background:var(--surface-card-raised);border:1px solid var(--border-subtle);border-radius:14px}
.lbl{font-size:11px;color:var(--text-secondary);font-weight:600}
</style></head><body>
<div class="u"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
<div class="u"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="lbl">card</span></div>
<div class="u"><div class="box" style="box-shadow:var(--shadow-raised)"></div><span class="lbl">raised</span></div>
<div class="u"><div class="box" style="box-shadow:var(--shadow-overlay)"></div><span class="lbl">overlay</span></div>
<div class="u"><div class="box" style="box-shadow:var(--shadow-pop)"></div><span class="lbl">pop</span></div>
</body></html>
