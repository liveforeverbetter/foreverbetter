<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;width:1280px;height:854px;overflow:hidden}
  .tile{display:flex;width:1280px;height:854px}
  .main{flex:0 0 940px;background:var(--mint-500);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:44px}
  .mark{color:#07090C}
  .name{font-family:var(--font-display);font-weight:700;font-size:150px;letter-spacing:-6px;color:#07090C;line-height:1}
  .strip{flex:1;display:flex;flex-direction:column}
  .strip span{flex:1}
</style>
</head>
<body>
<div class="tile">
  <div class="main">
    <svg width="300" height="300" viewBox="0 0 120 120" fill="none" class="mark">
      <circle cx="60" cy="60" r="46" stroke="#07090C" stroke-opacity="0.22" stroke-width="8"/>
      <path d="M60 14 a46 46 0 0 1 40.6 68.4" stroke="#07090C" stroke-width="8" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="24" stroke="#07090C" stroke-opacity="0.22" stroke-width="8"/>
      <path d="M60 36 a24 24 0 0 1 12 44.8" stroke="#07090C" stroke-width="8" stroke-linecap="round"/>
    </svg>
    <div class="name">MERIDIAN</div>
  </div>
  <div class="strip">
    <span style="background:var(--amber-400)"></span>
    <span style="background:var(--sleep-400)"></span>
    <span style="background:var(--strain-400)"></span>
    <span style="background:var(--violet-500)"></span>
  </div>
</div>
</body>
</html>
