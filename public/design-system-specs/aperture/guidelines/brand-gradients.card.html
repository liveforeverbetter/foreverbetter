<!DOCTYPE html>

<body><div class="grid">
<div class="box" style="background:var(--grad-mesh);color:var(--text-secondary)">grad-mesh</div>
<div class="box" style="background:var(--grad-dawn);color:var(--text-secondary)">grad-dawn</div>
<div class="box" style="background:var(--grad-brand);color:#fff">grad-brand</div>
<div class="box" style="background:var(--grad-vitality);color:#fff">grad-vitality</div>
</div></body></html>
