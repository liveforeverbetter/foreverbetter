<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Teal" subtitle="Primary accent ramp · --brand = #0EA5A0" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
.row{display:flex;gap:0;border-radius:14px;overflow:hidden}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-size:11px;font-weight:600}.h{font-family:var(--font-mono);font-size:10px;opacity:.85}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--teal-50)"><span class="n">50</span></div>
<div class="sw" style="background:var(--teal-100)"><span class="n">100</span></div>
<div class="sw" style="background:var(--teal-200)"><span class="n">200</span></div>
<div class="sw" style="background:var(--teal-300)"><span class="n">300</span></div>
<div class="sw" style="background:var(--teal-400);color:#fff"><span class="n">400</span></div>
<div class="sw" style="background:var(--teal-500);color:#fff"><span class="n">500 · brand</span><span class="h">#0EA5A0</span></div>
<div class="sw" style="background:var(--teal-600);color:#fff"><span class="n">600</span></div>
<div class="sw" style="background:var(--teal-700);color:#fff"><span class="n">700</span></div>
<div class="sw" style="background:var(--teal-800);color:#fff"><span class="n">800</span></div>
<div class="sw" style="background:var(--teal-900);color:#fff"><span class="n">900</span></div>
</div></body></html>
