<!-- @dsCard group="Spacing" viewport="700x160" name="Radius scale" subtitle="xs 6 → 2xl 32 → full" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px;background:var(--surface-card);color:var(--text-primary)}
.grid{display:flex;gap:14px;align-items:flex-end}
.col{text-align:center;flex:1}
.box{height:70px;background:var(--teal-100);border:1.5px solid var(--teal-300)}
.l{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin-top:8px}</style></head>
<body><div class="grid">
<div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="l">xs · 6</div></div>
<div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="l">sm · 10</div></div>
<div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="l">md · 14</div></div>
<div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="l">lg · 20</div></div>
<div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="l">xl · 26</div></div>
<div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="l">2xl · 32</div></div>
<div class="col"><div class="box" style="border-radius:var(--radius-full)"></div><div class="l">full</div></div>
</div></body></html>
