<!-- @dsCard group="Colors" viewport="700x150" name="Semantic surfaces & text" subtitle="Canvas, card, text, and border aliases" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:16px;padding:16px}
.t1{color:var(--text-primary);font-weight:700;font-size:15px}
.t2{color:var(--text-secondary);font-size:13px;margin-top:4px}
.t3{color:var(--text-tertiary);font-size:12px;margin-top:2px}
.t4{color:var(--text-muted);font-size:12px;margin-top:2px}
.brand{color:var(--text-brand);font-weight:600;font-size:13px;margin-top:6px}
.chip{display:inline-block;padding:6px 10px;border-radius:10px;font-size:12px;font-weight:600}</style></head>
<body><div class="grid">
<div class="card"><div class="t1">Primary text</div><div class="t2">Secondary text</div><div class="t3">Tertiary text</div><div class="t4">Muted text</div><div class="brand">Brand link</div></div>
<div class="card" style="background:var(--surface-page)"><div class="t1">Page canvas</div><div class="t3">--surface-page</div></div>
<div class="card" style="background:var(--surface-sunken)"><div class="t1">Sunken track</div><div class="t3">--surface-sunken</div></div>
<div class="card" style="background:var(--surface-inverse)"><div style="color:#fff;font-weight:700;font-size:15px">Inverse</div><div style="color:var(--ink-400);font-size:12px;margin-top:4px">--surface-inverse</div></div>
</div></body></html>
