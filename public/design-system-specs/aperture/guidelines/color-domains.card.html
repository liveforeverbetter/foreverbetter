<!-- @dsCard group="Colors" viewport="700x170" name="Health domains" subtitle="Sleep · Activity · Nutrition · Mindfulness · Vitals · Heart" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.col{display:flex;flex-direction:column;gap:6px}
.big{height:70px;border-radius:14px;display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:600}
.wash{height:26px;border-radius:8px}
.lab{font-size:11px;font-weight:600;color:var(--text-secondary);text-align:center}</style></head>
<body><div class="grid">
<div class="col"><div class="big" style="background:var(--sleep-500)">500</div><div class="wash" style="background:var(--sleep-50)"></div><div class="lab">Sleep</div></div>
<div class="col"><div class="big" style="background:var(--activity-500)">500</div><div class="wash" style="background:var(--activity-50)"></div><div class="lab">Activity</div></div>
<div class="col"><div class="big" style="background:var(--nutrition-500)">500</div><div class="wash" style="background:var(--nutrition-50)"></div><div class="lab">Nutrition</div></div>
<div class="col"><div class="big" style="background:var(--mind-500)">500</div><div class="wash" style="background:var(--mind-50)"></div><div class="lab">Mindfulness</div></div>
<div class="col"><div class="big" style="background:var(--vitals-500)">500</div><div class="wash" style="background:var(--vitals-50)"></div><div class="lab">Vitals</div></div>
<div class="col"><div class="big" style="background:var(--heart-500)">500</div><div class="wash" style="background:var(--heart-50)"></div><div class="lab">Heart</div></div>
</div></body></html>
