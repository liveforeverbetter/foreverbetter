<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px;background:var(--surface-card);color:var(--text-primary)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.cell{background:var(--surface-sunken);border-radius:14px;padding:16px}
.v{font-family:var(--font-mono);font-weight:600;font-size:26px}.u{font-size:13px;color:var(--text-muted);margin-left:3px}
.l{font-size:12px;color:var(--text-tertiary);margin-top:6px}</style></head>
<body><div class="grid">
<div class="cell"><span class="v">62<span class="u">bpm</span></span><div class="l">Resting HR</div></div>
<div class="cell"><span class="v">38<span class="u">ms</span></span><div class="l">HRV</div></div>
<div class="cell"><span class="v">6h 41m</span><div class="l">Sleep avg</div></div>
<div class="cell"><span class="v">128<span class="u">mg/dL</span></span><div class="l">LDL</div></div>
</div></body></html>
