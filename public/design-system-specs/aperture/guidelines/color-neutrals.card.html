<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals — warm slate" subtitle="Page, text, and border ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
.row{display:flex;gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--border-subtle)}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-size:11px;font-weight:600}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--white)"><span class="n">white</span></div>
<div class="sw" style="background:var(--ink-50)"><span class="n">50</span></div>
<div class="sw" style="background:var(--ink-100)"><span class="n">100</span></div>
<div class="sw" style="background:var(--ink-200)"><span class="n">200</span></div>
<div class="sw" style="background:var(--ink-300)"><span class="n">300</span></div>
<div class="sw" style="background:var(--ink-400);color:#fff"><span class="n">400</span></div>
<div class="sw" style="background:var(--ink-500);color:#fff"><span class="n">500</span></div>
<div class="sw" style="background:var(--ink-600);color:#fff"><span class="n">600</span></div>
<div class="sw" style="background:var(--ink-700);color:#fff"><span class="n">700</span></div>
<div class="sw" style="background:var(--ink-800);color:#fff"><span class="n">800</span></div>
<div class="sw" style="background:var(--ink-900);color:#fff"><span class="n">900</span></div>
<div class="sw" style="background:var(--ink-950);color:#fff"><span class="n">950</span></div>
</div></body></html>
