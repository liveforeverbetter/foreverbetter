<!-- @dsCard group="Brand" viewport="700x180" name="Elevation & aura" subtitle="Soft shadows + the signature teal aura" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:28px 22px;background:var(--surface-page)}
.grid{display:flex;gap:22px}
.col{flex:1;text-align:center}
.box{height:80px;background:var(--surface-card);border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-secondary)}
.l{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin-top:12px}</style></head>
<body><div class="grid">
<div class="col"><div class="box" style="box-shadow:var(--shadow-sm)">sm</div><div class="l">--shadow-sm</div></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-card)">card</div><div class="l">--shadow-card</div></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-raised)">raised</div><div class="l">--shadow-raised</div></div>
<div class="col"><div class="box" style="box-shadow:var(--shadow-pop)">pop</div><div class="l">--shadow-pop</div></div>
<div class="col"><div class="box" style="box-shadow:var(--aura-teal)">aura</div><div class="l">--aura-teal</div></div>
</div></body></html>
