<!-- @dsCard group="Colors" viewport="700x150" name="Score bands" subtitle="Excellent · Good · Fair · Needs attention" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:6px}
.dot{width:14px;height:14px;border-radius:999px}
.lab{font-family:var(--font-display);font-weight:700;font-size:16px}
.h{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}</style></head>
<body><div class="grid">
<div class="card" style="background:var(--score-excellent-bg)"><div class="dot" style="background:var(--score-excellent)"></div><div class="lab" style="color:var(--score-excellent)">Excellent</div><div class="h">--score-excellent</div></div>
<div class="card" style="background:var(--score-good-bg)"><div class="dot" style="background:var(--score-good)"></div><div class="lab" style="color:var(--score-good)">Good</div><div class="h">--score-good</div></div>
<div class="card" style="background:var(--score-fair-bg)"><div class="dot" style="background:var(--score-fair)"></div><div class="lab" style="color:var(--score-fair)">Fair</div><div class="h">--score-fair</div></div>
<div class="card" style="background:var(--score-attention-bg)"><div class="dot" style="background:var(--score-attention)"></div><div class="lab" style="color:var(--score-attention)">Needs attention</div><div class="h">--score-attention</div></div>
</div></body></html>
