<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Typographic mark — Fustat 800 (no logo provided)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:0;background:var(--surface-card);display:flex;align-items:center;gap:36px;height:150px;padding-left:32px}
.lock{display:flex;align-items:center;gap:12px}
.mark{width:44px;height:44px;border-radius:13px;background:var(--grad-brand);color:#fff;display:flex;align-items:center;justify-content:center}
.wm{font-family:var(--font-display);font-weight:800;font-size:40px;letter-spacing:-0.03em;color:var(--text-primary)}
.inv{background:var(--ink-900);border-radius:18px;padding:18px 26px}
.inv .wm{color:#fff}</style></head>
<body>
<div class="lock"><span class="mark"><i data-lucide="aperture" style="width:26px"></i></span><span class="wm">Aperture</span></div>
<div class="inv lock"><span class="wm">Aperture</span></div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons()</script>
</body></html>
