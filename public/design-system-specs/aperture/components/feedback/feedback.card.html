<!-- @dsCard group="Components" viewport="700x420" name="Feedback — pills, insight, toast, modal" subtitle="Status pills · insight banner · toast · modal" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .modalbox { position: relative; height: 300px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-subtle); }
  .modalbox > div { position: absolute !important; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel">
const { StatusPill, InsightBanner, Toast, Modal, Button } = window.ApertureDesignSystem_6066d1;
const I = (n) => <i data-lucide={n}></i>;
function Demo() {
  return (
    <div className="grid">
      <div className="stack">
        <div>
          <div className="row">
            <StatusPill tone="excellent">Excellent</StatusPill>
            <StatusPill tone="good">Good</StatusPill>
            <StatusPill tone="fair">Fair</StatusPill>
            <StatusPill tone="attention">Needs attention</StatusPill>
          </div>
          <div className="row">
            <StatusPill tone="good" variant="solid">In range</StatusPill>
            <StatusPill tone="attention" variant="solid">Out of range</StatusPill>
            <StatusPill tone="fair" variant="outline">Borderline</StatusPill>
            <StatusPill tone="excellent" icon={I("sparkles")}>New insight</StatusPill>
          </div>
        </div>
        <InsightBanner gradient="var(--grad-mesh)" glow title="Incredible yesterday!"
          body="You walked 2.5× farther than the day before. Walking is one of the best ways to stay healthy — keep this trend going."
          dots={3} activeDot={0} />
        <Toast tone="good" title="Reading saved" message="Blood pressure added to today's log." onDismiss={()=>{}} />
      </div>
      <div className="modalbox">
        <Modal title="Log a reading" subtitle="Step 1: Choose a metric" onClose={()=>{}}
          actions={<><Button variant="ghost">Cancel</Button><Button variant="primary">Continue</Button></>}>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {["Blood pressure","Resting heart rate","Body temperature"].map((m,i)=>(
              <label key={m} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",border:"1.5px solid "+(i===0?"var(--border-brand)":"var(--border-default)"),borderRadius:14,fontSize:14,fontWeight:600}}>
                <span style={{width:16,height:16,borderRadius:99,border:"2px solid "+(i===0?"var(--brand)":"var(--border-strong)"),background:i===0?"var(--brand)":"transparent"}}></span>{m}
              </label>
            ))}
          </div>
        </Modal>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
