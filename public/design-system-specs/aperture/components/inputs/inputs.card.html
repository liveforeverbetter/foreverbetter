<!-- @dsCard group="Components" viewport="700x300" name="Inputs — field, switch, segmented" subtitle="Text field · switch · segmented control (text + icon)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel">
const { Input, Switch, SegmentedControl } = window.ApertureDesignSystem_6066d1;
const I = (n) => <i data-lucide={n}></i>;
function Demo() {
  const [range, setRange] = React.useState("week");
  const [tab, setTab] = React.useState("overview");
  const [on1, setOn1] = React.useState(true);
  const [on2, setOn2] = React.useState(false);
  return (
    <div className="grid">
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Input label="Email" placeholder="you@example.com" icon={I("mail")} />
        <Input label="Resting heart rate" defaultValue="140" error="Enter a value between 30–200 bpm" />
      </div>
      <div>
        <div className="lbl">Switches</div>
        <div className="row"><Switch checked={on1} onChange={setOn1} /><span style={{fontSize:14,fontWeight:600}}>Daily reminders</span></div>
        <div className="row"><Switch checked={on2} onChange={setOn2} /><span style={{fontSize:14,fontWeight:600}}>Share with clinician</span></div>
        <div className="lbl" style={{marginTop:8}}>Segmented</div>
        <div style={{marginBottom:14}}>
          <SegmentedControl value={range} onChange={setRange} options={[{id:"day",label:"Day"},{id:"week",label:"Week"},{id:"month",label:"Month"},{id:"year",label:"Year"}]} />
        </div>
        <SegmentedControl iconOnly value={tab} onChange={setTab} options={[
          {id:"overview",label:"Overview",icon:I("layout-grid")},
          {id:"activity",label:"Activity",icon:I("activity")},
          {id:"sleep",label:"Sleep",icon:I("moon")},
          {id:"nutrition",label:"Nutrition",icon:I("utensils")},
          {id:"mind",label:"Mind",icon:I("brain")},
          {id:"vitals",label:"Vitals",icon:I("heart-pulse")}]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
