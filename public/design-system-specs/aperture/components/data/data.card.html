<!-- @dsCard group="Components" viewport="700x420" name="Health data viz" subtitle="Score card · rings · range gauge · area chart · metric tiles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: 1.15fr 0.85fr 1fr; gap: 16px; align-items: start; }
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .center { display:flex; gap: 20px; align-items:center; justify-content:center; }
  .cap { font-family: var(--font-display); font-weight: 800; font-size: 26px; }
  .sub { font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel">
const { ScoreCard, MetricTile, ProgressRing, ActivityRing, RangeGauge, AreaChart, Card } = window.ApertureDesignSystem_6066d1;
const I = (n) => <i data-lucide={n}></i>;
function Demo() {
  return (
    <div className="grid">
      <div style={{display:"flex", flexDirection:"column", gap:16}}>
        <ScoreCard score={77} band="Good" tone="good" delta={2}
          description="Your heart health score is good. Vascular load is a critical part of your score — foods high in potassium can help keep it under control." />
        <Card radius="xl" padding="md">
          <RangeGauge status="Balanced" statusTone="good" value={0.55} band={[0.4,0.72]} leftLabel="Under" rightLabel="Injury risk" />
        </Card>
      </div>
      <div style={{display:"flex", flexDirection:"column", gap:16}}>
        <Card radius="xl" padding="md" className="center">
          <ProgressRing value={82} size={104} color="var(--score-good)">
            <span className="cap">82</span><span className="sub">Energy</span>
          </ProgressRing>
          <ActivityRing size={104} rings={[
            {value:93,max:120,color:"var(--activity-500)"},
            {value:18,max:30,color:"var(--sleep-500)"},
            {value:6,max:20,color:"var(--nutrition-500)"}]} />
        </Card>
        <div className="tiles">
          <MetricTile label="7-day sleep average" value="6h 41m" status="Good" statusTone="good" icon={I("moon")} iconTone="sleep" />
          <MetricTile label="Heart rate" value="85" unit="bpm" status="High" statusTone="attention" icon={I("heart")} iconTone="heart" />
        </div>
      </div>
      <Card radius="xl" padding="md">
        <div style={{fontWeight:700, marginBottom:4}}>Today's cardio load</div>
        <div className="sub" style={{marginBottom:12}}>2 workouts</div>
        <AreaChart data={[2,2,3,3,9,20,24,24]} color="var(--activity-500)" targetBand={[20,30]}
          xLabels={["12 AM","6 AM","12 PM","6 PM"]} height={150} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
