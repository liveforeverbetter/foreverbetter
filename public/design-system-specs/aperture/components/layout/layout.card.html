<!-- @dsCard group="Components" viewport="700x400" name="Layout — cards, list, nav" subtitle="Card tones · list rows · sidebar · tab bar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: 1.1fr 1fr 0.9fr; gap: 18px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel">
const { Card, ListItem, Sidebar, TabBar } = window.ApertureDesignSystem_6066d1;
const I = (n) => <i data-lucide={n}></i>;
function Demo() {
  return (
    <div className="grid">
      <div className="stack">
        <Card radius="xl" padding="lg"><div style={{fontWeight:700, fontSize:18}}>White surface</div><div style={{color:"var(--text-tertiary)", marginTop:6, fontSize:14}}>Default card — hairline border, soft shadow.</div></Card>
        <Card tone="good" radius="xl"><div style={{fontWeight:700}}>Good</div><div style={{fontSize:14, marginTop:4}}>Score-tone wash for status.</div></Card>
        <Card gradient="var(--grad-mesh)" radius="2xl" glow><div style={{fontWeight:700, fontSize:18}}>Featured insight</div><div style={{fontSize:14, marginTop:6, color:"var(--text-secondary)"}}>Gradient + aura glow.</div></Card>
      </div>
      <Card radius="xl" padding="sm">
        <ListItem icon={I("heart")} iconTone="heart" title="Resting heart rate" subtitle="7-day average" value="58" valueUnit="bpm" chevron divider />
        <ListItem icon={I("moon")} iconTone="sleep" title="Sleep" subtitle="Last night" value="7:12" chevron divider />
        <ListItem icon={I("footprints")} iconTone="activity" title="Steps" subtitle="Today" value="9,204" chevron divider />
        <ListItem icon={I("dna")} iconTone="mind" title="Genetic risk" subtitle="3 new insights" chevron />
      </Card>
      <div className="stack">
        <div style={{height:300, borderRadius:20, overflow:"hidden", boxShadow:"var(--shadow-card)"}}>
          <Sidebar active="overview" items={[
            {id:"overview",label:"Overview",icon:I("layout-grid")},
            {id:"plan",label:"Action plan",icon:I("target"),badge:2},
            {label:"Health",section:true},
            {id:"genetics",label:"Genetics",icon:I("dna")},
            {id:"bio",label:"Biomarkers",icon:I("flask-conical")},
          ]} />
        </div>
        <TabBar active="home" items={[
          {id:"home",label:"Home",icon:I("house")},
          {id:"plan",label:"Plan",icon:I("target")},
          {id:"labs",label:"Labs",icon:I("flask-conical")},
          {id:"me",label:"Me",icon:I("user")},
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
