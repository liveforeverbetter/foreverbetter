<!-- @dsCard group="Components" viewport="700x260" name="Buttons & icon buttons" subtitle="6 variants · 3 sizes · icon + ghost states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); color: var(--text-primary); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 16px; }
  .lbl { width: 100%; font-size: var(--fs-caption); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-muted); margin: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel">
const { Button, IconButton } = window.ApertureDesignSystem_6066d1;
const I = (n) => <i data-lucide={n}></i>;
function Demo() {
  return (
    <div>
      <div className="lbl">Variants (md)</div>
      <div className="row">
        <Button variant="primary">Primary</Button>
        <Button variant="brand">Brand</Button>
        <Button variant="secondary">Secondary</Button>
        <Button variant="soft">Soft</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="danger">Danger</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div className="lbl">Sizes · with icons</div>
      <div className="row">
        <Button variant="primary" size="sm" icon={I("plus")}>Small</Button>
        <Button variant="primary" size="md" icon={I("plus")}>Medium</Button>
        <Button variant="primary" size="lg" icon={I("plus")}>Large</Button>
        <Button variant="soft" iconRight={I("chevron-right")}>See plan</Button>
      </div>
      <div className="lbl">Icon buttons</div>
      <div className="row">
        <IconButton label="Back" variant="outline">{I("chevron-left")}</IconButton>
        <IconButton label="More" variant="ghost">{I("more-vertical")}</IconButton>
        <IconButton label="Add" variant="soft">{I("plus")}</IconButton>
        <IconButton label="Fav" variant="solid">{I("heart")}</IconButton>
        <IconButton label="Sel" variant="ghost" active>{I("bar-chart-2")}</IconButton>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
