<!DOCTYPE html>
<!-- @dsCard group="7 · Layouts" name="Login" subtitle="1:1 with Figma Desktop17 — v2" viewport="1440x1024" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign-in · Polygon OMS</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  /* ──────────────────────────────────────────────────────────────
     Login — 1:1 with Figma node 1452:37292 (Desktop17)
     Frame 1512×982. Two columns 756 / 756.
     LEFT (Form Container): centered 400×408 card.
     RIGHT (Art Container): 700×848 art block at left:756 top:67, radius 24.
     ────────────────────────────────────────────────────────────── */
  html, body { margin: 0; background: #fff; color: var(--fg-primary); font-family: var(--font-display); -webkit-font-smoothing: antialiased; }

  .login {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: #fff;
  }

  /* ─── LEFT: Form Container ─────────────────────────────── */
  .login__form {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .form-card {
    width: 400px;
    border-radius: 24px;
    padding: 32px 28px;
    box-sizing: border-box;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 33px;          /* matches Figma "Sign-In Content" gap */
    align-items: stretch;
  }

  /* Title block */
  .form-card__head {
    display: flex;
    flex-direction: column;
    gap: 20px;          /* Figma Title Container gap */
    align-items: center;
  }
  .form-card__title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 28px;
    line-height: 1.2;
    color: rgb(2, 0, 5);
    margin: 0;
    text-align: center;
    letter-spacing: -0.005em;
  }
  .form-card__subtitle {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 14px;
    line-height: 1.2;
    color: rgb(72, 82, 111);
    margin: 0;
    text-align: center;
  }
  .form-card__subtitle a { color: rgb(72, 82, 111); text-decoration: none; }
  .form-card__subtitle a:hover { color: rgb(2, 0, 5); text-decoration: underline; }

  /* Fields (input + button) */
  .form-card__fields { display: flex; flex-direction: column; gap: 24px; }
  .form-card__group { display: flex; flex-direction: column; gap: 16px; }

  .form-card__input {
    width: 100%;
    height: 40px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1px solid var(--slate-300, #C8CFE1);
    font-family: var(--font-display);
    font-size: 14px;
    color: rgb(2, 0, 5);
    background: #fff;
    outline: none;
    box-sizing: border-box;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .form-card__input::placeholder { color: rgb(146, 158, 186); }
  .form-card__input:focus {
    border-color: rgb(2, 0, 5);
    box-shadow: 0 0 0 3px rgba(2, 0, 5, 0.08);
  }

  /* Continue — Size=lg primary, fill rgb(2,0,5), with leading + icon per Figma 1468:49939 */
  .form-card__continue {
    position: relative;
    height: 40px;
    width: 100%;
    border-radius: 12px;
    background: rgb(2, 0, 5);
    color: #fff;
    border: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 14px;
    line-height: 24px;
    cursor: pointer;
    transition: background-color 120ms ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 12px;
  }
  .form-card__continue:hover { background: rgb(20, 22, 53); }
  .form-card__continue svg { width: 16px; height: 16px; display: block; }
  .form-card__continue .icon-left {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Or divider */
  .form-card__or {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
  }
  .form-card__or hr {
    border: 0;
    height: 1px;
    background: var(--slate-200, #E1E5F0);
    margin: 0;
  }
  .form-card__or span {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 12px;
    line-height: 1.2;
    color: rgb(146, 158, 186);
  }

  /* Social buttons */
  .form-card__socials {
    display: flex;
    flex-direction: row;
    gap: 12px;
    justify-content: center;
    align-items: center;
  }
  .form-card__socials button {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--slate-300, #C8CFE1);
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background-color 120ms ease, border-color 120ms ease;
    padding: 0;
  }
  .form-card__socials button:hover { background: var(--slate-50); border-color: var(--slate-500); }
  .form-card__socials svg { width: 18px; height: 18px; display: block; }

  /* Terms */
  .form-card__terms a { color: #670DE5; text-decoration: none; }
  .form-card__terms a:hover { text-decoration: underline; }
  .form-card__terms {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 14px;
    line-height: 1.2;
    color: rgb(72, 82, 111);
    text-align: center;
    margin: 0;
    max-width: 240px;
    align-self: center;
  }

  /* ─── RIGHT: Art Container ─────────────────────────────── */
  .login__art-col {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 67px 56px 67px 0;
    box-sizing: border-box;
  }
  .login__brand {
    /* 700 × 848 per Figma art container */
    width: 100%;
    max-width: 700px;
    aspect-ratio: 700 / 848;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    isolation: isolate;
    /* Figma: white→purple overlay layered ON TOP of cyan→blue→purple base.
       Both are vertical linear gradients. */
    background:
      linear-gradient(154deg, rgba(255, 255, 255, 0.50) 10.92%, rgba(149, 81, 245, 0.90) 93.21%),
      linear-gradient(180deg,
        #67E8F9 0.4%,
        #3BD1E8 15.95%,
        #06B6D4 35.47%,
        #4788E3 77.43%,
        #9551F5 118.73%);
  }
  /* 3D asset — Figma transform matrix(0.540, 0.842, -0.842, 0.540, 1015.567, -624)
     applied to a 1113×1631 element inside a 700×848 frame.
     We scale that math down to fit our box: scale factor = boxWidth / 700. */
  .login__brand-art {
    position: absolute;
    left: 0;
    top: 0;
    width: 1113px;
    height: 1631px;
    object-fit: cover;
    transform: matrix(0.540, 0.842, -0.842, 0.540, 1015.567, -624);
    transform-origin: 0 0;
    z-index: 0;
    opacity: 0.5;          /* Asset is 50% per Figma */
    pointer-events: none;
  }
  /* Wrapper that scales the entire 700×848 inner coordinate system to the actual box */
  .login__brand-inner {
    position: absolute;
    inset: 0;
    width: 700px;
    height: 848px;
    transform-origin: 0 0;
  }

  .login__brand-content {
    position: absolute;
    left: 47px;
    top: 475px;        /* Figma logo top */
    right: 47px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 27px;
    color: #fff;
  }
  .login__brand-logo {
    height: 36px;
    display: inline-flex;
    align-items: center;
    color: #fff;
  }
  .login__brand-logo svg { display: block; height: 36px; width: auto; }

  .login__brand-headline {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 60px;
    line-height: 1.1;
    color: #fff;
    margin: 0;
    width: 606px;
    letter-spacing: -0.01em;
  }

  /* ─── Responsive scaling: keep the inner art coords intact, scale the wrapper ── */
  @media (min-width: 1101px) {
    /* Default: viewport ≥ 1101 — art column is roughly 700px, no scale */
    .login__brand-inner { transform: scale(1); }
  }
  @media (max-width: 1100px) {
    .login { grid-template-columns: 1fr; }
    .login__art-col { padding: 24px; }
    .login__brand { aspect-ratio: 16 / 9; max-width: 100%; }
    .login__brand-headline { font-size: 36px; width: auto; }
    .login__brand-content { top: auto; bottom: 36px; }
    .login__brand-logo { height: 28px; }
    .login__brand-logo svg { height: 28px; }
  }
</style>
</head>
<body>
<main class="login" data-screen-label="Login">

  <!-- LEFT: Form Container -->
  <section class="login__form">
    <div class="form-card">
      <header class="form-card__head">
        <h1 class="form-card__title">Sign-up</h1>
        <p class="form-card__subtitle">Already have an account yet? <a href="#">Sign in</a></p>
      </header>

      <div class="form-card__fields">
        <div class="form-card__group">
          <input class="form-card__input" type="email" placeholder="Email" autocomplete="email" />
          <input class="form-card__input" type="text" placeholder="Full name" autocomplete="name" />
          <input class="form-card__input" type="text" placeholder="Company name" autocomplete="organization" />
          <button class="form-card__continue" type="button">
            <span>Continue</span>
          </button>
        </div>

        <div class="form-card__or">
          <hr />
          <span>or sign up with</span>
          <hr />
        </div>

        <div class="form-card__socials">
          <button aria-label="Sign up with Google">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.56c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.77c-.99.66-2.25 1.06-3.72 1.06-2.86 0-5.29-1.93-6.15-4.53H2.17v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.85 14.1A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.44.35-2.1V7.06H2.17a11 11 0 0 0 0 9.88l3.68-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.07.56 4.21 1.64l3.15-3.15C17.46 2.09 14.97 1 12 1A11 11 0 0 0 2.17 7.06l3.68 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
          </button>
          <button aria-label="Continue with Apple">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.7c0-2.5 2-3.7 2.1-3.8a4.5 4.5 0 0 0-3.5-1.9c-1.5-.2-2.9.9-3.7.9-.8 0-1.9-.9-3.2-.8a4.7 4.7 0 0 0-4 2.4c-1.7 3-.4 7.4 1.2 9.8.8 1.2 1.8 2.5 3.1 2.4 1.2-.1 1.7-.8 3.2-.8s1.9.8 3.2.8c1.3 0 2.2-1.2 3-2.4.9-1.4 1.3-2.7 1.3-2.8-.1-.1-2.6-1-2.7-3.8zM14.4 4.6c.7-.8 1.1-2 1-3.1-1 0-2.2.7-2.9 1.5-.6.7-1.2 1.9-1 3 1.1.1 2.2-.6 2.9-1.4z"/></svg>
          </button>
          <button aria-label="Continue with Facebook">
            <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5.02 3.66 9.18 8.44 9.94v-7.03H7.9v-2.91h2.54V9.85c0-2.52 1.49-3.91 3.78-3.91 1.1 0 2.24.2 2.24.2v2.47h-1.26c-1.24 0-1.63.78-1.63 1.57v1.88h2.78l-.45 2.91h-2.33V22c4.78-.76 8.43-4.92 8.43-9.94z"/></svg>
          </button>
          <button aria-label="Continue with GitHub">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.07 3.29 9.36 7.86 10.88.57.1.78-.25.78-.55v-2.1c-3.2.7-3.87-1.36-3.87-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.69 1.25 3.34.95.1-.74.4-1.25.73-1.54-2.55-.29-5.24-1.27-5.24-5.66 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.05 0 0 .96-.31 3.15 1.17a11 11 0 0 1 5.74 0c2.18-1.48 3.14-1.17 3.14-1.17.63 1.59.23 2.76.11 3.05.74.8 1.18 1.82 1.18 3.07 0 4.4-2.69 5.36-5.25 5.65.41.36.78 1.06.78 2.13v3.16c0 .31.21.66.79.55 4.57-1.52 7.85-5.81 7.85-10.88C23.5 5.65 18.35.5 12 .5z"/></svg>
          </button>
        </div>
      </div>

      <p class="form-card__terms">By continuing you agree to our <a href="#">Terms of use</a> and <a href="#">Privacy policy</a></p>
    </div>
  </section>

  <!-- RIGHT: Art Container -->
  <section class="login__art-col">
    <aside class="login__brand" id="brand">
      <div class="login__brand-inner" id="brandInner">
        <img class="login__brand-art" src="../assets/login-art-figma.png" alt="" aria-hidden="true" />
        <div class="login__brand-content">
          <span class="login__brand-logo" aria-label="polygon OMS">
            <img src="../assets/logo_polygon_oms_stacked.svg" alt="polygon OMS" style="height:36px; width:auto; filter: brightness(0) invert(1);" />
          </span>
          <h2 class="login__brand-headline">One stack for wallets, compliance, on and off-ramps, and settlement.</h2>
        </div>
      </div>
    </aside>
  </section>

</main>

<script>
  // Scale the 700×848 inner art coordinate system to fit the actual rendered .login__brand box.
  function fitBrand () {
    var brand = document.getElementById('brand');
    var inner = document.getElementById('brandInner');
    if (!brand || !inner) return;
    var rect = brand.getBoundingClientRect();
    var scale = rect.width / 700;
    inner.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', fitBrand);
  window.addEventListener('load', fitBrand);
  fitBrand();
</script>
</body>
</html>
