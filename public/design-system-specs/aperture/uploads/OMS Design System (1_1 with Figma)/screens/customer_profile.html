<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OMS · Jane Doe</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../components/sidebar.css?v=15" />
<link rel="stylesheet" href="../components/topnav.css" />
<link rel="stylesheet" href="../components/buttons.css" />
<link rel="stylesheet" href="../components/badges.css" />
<link rel="stylesheet" href="../components/inputs.css" />
<link rel="stylesheet" href="../components/alerts.css" />
<link rel="stylesheet" href="../components/status_banner.css" />
<link rel="stylesheet" href="../components/table.css" />
<link rel="stylesheet" href="../components/customer_profile.css" />
<link rel="stylesheet" href="../components/floater_button.css" />
<script defer src="../components/sidebar.js"></script>
<script defer src="../components/customer_profile.js"></script>
<style>
  html, body { margin: 0; background: #fff; }
  body { font-family: var(--font-display); color: var(--fg-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .shell { min-height: 100vh; display: flex; flex-direction: column; background: #fff; }
  .body { display: flex; flex: 1; min-height: 0; align-items: stretch; }
  .body > [data-oms-sidebar] { align-self: stretch; display: flex; flex-direction: column; }
  .body > [data-oms-sidebar] > .oms-sidebar { flex: 1; height: auto; }
  .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main { flex: 1; padding: 32px 36px 24px; display: flex; flex-direction: column; gap: 28px; background: #fff; }

  /* Breadcrumb */
  .crumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg-secondary); margin: 0; }
  .crumb a { color: var(--fg-secondary); text-decoration: none; }
  .crumb a:hover { color: var(--purple-700); }
  .crumb svg { width: 14px; height: 14px; }
  .crumb__current { color: var(--slate-900); font-weight: 600; }

  /* Header actions row */
  .head-actions { display: flex; gap: 8px; align-items: center; }

  /* KYC card */
  .kyc-card {
    background: var(--emerald-50, #ECFDF5);
    border: 1px solid var(--emerald-200, #A7F3D0);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--emerald-700, #047857);
  }
  .kyc-card__icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(4, 120, 87, 0.15);
    display: inline-flex; align-items: center; justify-content: center;
    flex: 0 0 36px;
  }
  .kyc-card__icon svg { width: 20px; height: 20px; }
  .kyc-card__main { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .kyc-card__title { font-size: 14px; font-weight: 700; margin: 0; }
  .kyc-card__sub { font-size: 13px; margin: 0; opacity: 0.85; }
  .kyc-card__action { background: transparent; border: 1px solid var(--emerald-200); color: var(--emerald-700); padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .kyc-card__action:hover { background: rgba(4,120,87,0.08); }

  /* Section title */
  .section-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--slate-950); margin: 8px 0 0; letter-spacing: -0.005em; }
</style>
</head>
<body>
<div class="shell" data-screen-label="Customer profile">

  <div class="oms-status-banner" data-mode="sandbox" data-oms-status-banner>
    <span class="oms-status-banner__mode" data-oms-status-banner-mode>Sandbox mode</span>
    <span class="oms-status-banner__msg" data-oms-status-banner-msg>You are testing OMSX capabilities in a sandbox environment</span>
    <span class="oms-status-banner__action">
      <button class="btn btn-sm btn-secondary" data-oms-status-banner-action>Switch to Live</button>
    </span>
  </div>

  <div class="body">
    <div data-oms-sidebar data-active="Customers" data-assets-base="../assets"></div>

    <div class="main-col">
      <nav class="oms-topnav" aria-label="Top navigation">
        <div class="oms-topnav__right">
          <div class="oms-topnav__menu">
            <a href="#" class="oms-topnav__item">
              <span class="oms-topnav__item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              </span><span>Docs</span>
            </a>
          </div>
          <a href="#" class="oms-topnav__profile">
            <span class="oms-topnav__profile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"></path></svg>
            </span><span>Acme Studios</span>
          </a>
        </div>
      </nav>

      <main class="main">
        <p class="crumb">
          <a href="customers.html">Customers</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          <span class="crumb__current">Jane Doe</span>
        </p>

        <!-- Customer profile component (Figma 313:10347) -->
        <header class="oms-customer-profile" data-device="desktop">
          <div class="oms-cp__info">
            <div class="oms-cp__name-row">
              <h1 class="oms-cp__name">Jane Doe</h1>
              <span class="oms-badge oms-badge--success oms-badge--md">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="9 12 11 14 15 10"></polyline></svg>
                KYC active
              </span>
            </div>
            <div class="oms-cp__details">
              <button class="oms-cp-atom" data-copyable data-copy="cust_01km8e1wr">
                <span class="oms-cp-atom__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg></span>
                <span class="oms-cp-atom__label">cust_01km…e1wr</span>
                <span class="oms-cp-atom__copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></span>
              </button>
              <span class="oms-cp__bullet"></span>
              <button class="oms-cp-atom" data-copyable data-copy="jane.doe@user.com">
                <span class="oms-cp-atom__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></span>
                <span class="oms-cp-atom__label">jane.doe@user.com</span>
                <span class="oms-cp-atom__copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></span>
              </button>
              <span class="oms-cp__bullet"></span>
              <span class="oms-cp-atom">
                <span class="oms-cp-atom__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span>
                <span class="oms-cp-atom__label">Joined Jan 15, 2026</span>
              </span>
            </div>
          </div>

          <div class="oms-cp__balance">
            <p class="oms-cp__balance-label">Balance</p>
            <p class="oms-cp__balance-value">$12,345.67</p>
          </div>
        </header>

        <div class="head-actions" style="margin-top:-12px;">
          <button class="btn btn-md btn-secondary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            Email customer
          </button>
          <button class="btn btn-md btn-secondary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            New transaction
          </button>
          <button class="btn btn-md btn-secondary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
          </button>
        </div>

        <div class="kyc-card">
          <span class="kyc-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </span>
          <div class="kyc-card__main">
            <p class="kyc-card__title">KYC verified · Tier 2</p>
            <p class="kyc-card__sub">Verified Mar 2, 2026 by Sumsub. Next review due Mar 2, 2027.</p>
          </div>
          <button class="kyc-card__action">View documents</button>
        </div>

        <h2 class="section-title">Transactions</h2>

        <section class="oms-table" data-screen-label="Customer transactions">
          <div class="oms-table__controls oms-table__controls--no-title">
            <label class="oms-table__search">
              <svg class="oms-table__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg>
              <input type="text" placeholder="Search transactions" />
            </label>
            <div class="oms-table__controls-actions">
              <button class="oms-table__icon-btn" aria-label="Filter">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
              </button>
              <button class="oms-table__icon-btn" aria-label="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </button>
            </div>
          </div>
          <div class="oms-table__slot">
            <div class="oms-table__scroll">
              <table class="oms-table__grid">
                <thead><tr id="thead"></tr></thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <button class="oms-floater oms-floater--fixed" aria-label="Contact support">
    <span class="oms-floater__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9a9 9 0 0 1 18 0v9a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"></path></svg></span>
  </button>
</div>

<script>
  const HEADERS=["Transaction ID","Type","Amount","Asset","Network","Status","Created"];
  const ROWS=[
    {id:"txn_01km…f3a2",type:"On-ramp", amt:"+$198.88",  asset:"USDT",net:"Polygon",status:"settled",date:"Apr 28, 14:02"},
    {id:"txn_01km…f1d8",type:"On-ramp", amt:"+$540.00",  asset:"USDC",net:"Polygon",status:"settled",date:"Apr 21, 09:14"},
    {id:"txn_01km…ec33",type:"Withdraw",amt:"−$120.00",  asset:"USDC",net:"Polygon",status:"settled",date:"Apr 12, 16:50"},
    {id:"txn_01km…d922",type:"Off-ramp",amt:"−$3,200.00",asset:"USDC",net:"Ethereum",status:"pending",date:"Apr 09, 11:33", hover:true},
    {id:"txn_01km…cb15",type:"Deposit", amt:"+$1,000.00",asset:"USDT",net:"Polygon",status:"settled",date:"Mar 28, 08:21"},
    {id:"txn_01km…c014",type:"Refund",  amt:"−$45.00",   asset:"USDC",net:"Polygon",status:"refunded",date:"Mar 18, 19:02"},
  ];
  const STATUS={
    settled:{c:"oms-badge--success",l:"Settled",i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="9 12 11 14 15 10"></polyline></svg>'},
    pending:{c:"oms-badge--info",l:"Pending",i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>'},
    refunded:{c:"oms-badge--neutral",l:"Refunded",i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>'},
  };
  const copyIcon='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
  document.getElementById('thead').innerHTML=HEADERS.map(h=>`<th><span class="oms-table__head-label">${h}</span></th>`).join('');
  const cP=t=>`<td><div class="oms-table__cell"><span class="oms-table__cell-text">${t}</span></div></td>`;
  const cC=t=>`<td><div class="oms-table__cell"><span class="oms-table__cell-text">${t}</span><button class="oms-table__cell-copy" aria-label="Copy">${copyIcon}</button></div></td>`;
  const cA=t=>`<td><div class="oms-table__cell"><span class="oms-table__cell-text" style="color:${t.startsWith('+')?'var(--emerald-700)':'var(--slate-950)'};font-variant-numeric:tabular-nums;font-weight:600;">${t}</span></div></td>`;
  const cS=s=>{const x=STATUS[s];return `<td><div class="oms-table__cell"><span class="oms-badge ${x.c} oms-badge--sm">${x.i}${x.l}</span></div></td>`;};
  document.getElementById('tbody').innerHTML=ROWS.map(r=>`<tr${r.hover?' class="is-hover"':''}>${cC(r.id)}${cP(r.type)}${cA(r.amt)}${cP(r.asset)}${cP(r.net)}${cS(r.status)}${cP(r.date)}</tr>`).join('');

  function setMode(mode){const banner=document.querySelector('[data-oms-status-banner]');if(!banner)return;banner.setAttribute('data-mode',mode);const m=banner.querySelector('[data-oms-status-banner-mode]'),s=banner.querySelector('[data-oms-status-banner-msg]'),a=banner.querySelector('[data-oms-status-banner-action]');if(mode==='live'){m.textContent='Live mode';s.textContent='You are operating in the live OMSX environment — real funds and customers';a.textContent='Switch to Sandbox';}else{m.textContent='Sandbox mode';s.textContent='You are testing OMSX capabilities in a sandbox environment';a.textContent='Switch to Live';}const t=document.querySelector('[data-oms-mode-toggle]');if(t){t.querySelectorAll('.oms-mode-toggle__opt').forEach((o,i)=>{const on=(i===0&&mode==='sandbox')||(i===1&&mode==='live');o.classList.toggle('is-active',on);o.setAttribute('aria-selected',String(on));});t.classList.toggle('oms-mode-toggle--live',mode==='live');}}
  function wireToggle(){const t=document.querySelector('[data-oms-mode-toggle]');if(!t||t.__w)return false;t.__w=true;t.addEventListener('click',e=>{const o=e.target.closest('.oms-mode-toggle__opt');if(!o)return;const i=[...t.querySelectorAll('.oms-mode-toggle__opt')].indexOf(o);setMode(i===1?'live':'sandbox');});return true;}
  if(!wireToggle()){const mo=new MutationObserver(()=>{if(wireToggle())mo.disconnect();});mo.observe(document.body,{childList:true,subtree:true});}
  document.addEventListener('click',e=>{const b=e.target.closest('[data-oms-status-banner-action]');if(!b)return;const cur=document.querySelector('[data-oms-status-banner]').getAttribute('data-mode');setMode(cur==='live'?'sandbox':'live');});
</script>
</body>
</html>
