<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-page-default); }
  body { padding: 22px 28px; font-family: var(--font-doc); color: var(--fg-primary); }
  .row { display: flex; align-items: flex-end; gap: 16px; height: 100px; }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--purple-500); border-radius: 3px; }
  .name { font-family: var(--font-doc); font-size: 10px; color: var(--fg-secondary); }
  .px { font-family: var(--font-doc); font-weight: 500; font-size: 12px; color: var(--fg-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="stack"><div class="bar" style="width:2px;height:2px"></div><div class="px">2</div><div class="name">--space-0-5</div></div>
    <div class="stack"><div class="bar" style="width:4px;height:4px"></div><div class="px">4</div><div class="name">--space-1</div></div>
    <div class="stack"><div class="bar" style="width:8px;height:8px"></div><div class="px">8</div><div class="name">--space-2</div></div>
    <div class="stack"><div class="bar" style="width:12px;height:12px"></div><div class="px">12</div><div class="name">--space-3</div></div>
    <div class="stack"><div class="bar" style="width:16px;height:16px"></div><div class="px">16</div><div class="name">--space-4</div></div>
    <div class="stack"><div class="bar" style="width:20px;height:20px"></div><div class="px">20</div><div class="name">--space-5</div></div>
    <div class="stack"><div class="bar" style="width:24px;height:24px"></div><div class="px">24</div><div class="name">--space-6</div></div>
    <div class="stack"><div class="bar" style="width:32px;height:32px"></div><div class="px">32</div><div class="name">--space-8</div></div>
    <div class="stack"><div class="bar" style="width:40px;height:40px"></div><div class="px">40</div><div class="name">--space-10</div></div>
    <div class="stack"><div class="bar" style="width:48px;height:48px"></div><div class="px">48</div><div class="name">--space-12</div></div>
    <div class="stack"><div class="bar" style="width:64px;height:64px"></div><div class="px">64</div><div class="name">--space-16</div></div>
  </div>
</body>
</html>
