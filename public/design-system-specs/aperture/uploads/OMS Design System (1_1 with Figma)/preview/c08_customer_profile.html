<!DOCTYPE html>
<!-- @dsCard group="6 · Components" name="Customer profile" subtitle="Identity strip — name, KYC, identifiers, balance" viewport="1100x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Customer profile — Component</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components/customer_profile.css">
<link rel="stylesheet" href="../components/buttons.css">
<link rel="stylesheet" href="../components/badges.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; background: var(--bg-page-default, #F6F6FC); }
  body {
    padding: 64px 56px;
    font-family: var(--font-main);
    color: var(--fg-primary);
    display: flex;
    justify-content: center;
  }

  /* KYC badge mimicking Figma StateSuccessSizeSmallInverted */
  .kyc-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #ECFDF5;
    border: 0.5px solid #A7F3D0;
    border-radius: 16px;
    padding: 4px 8px;
    font-family: var(--font-main);
    font-weight: 500;
    font-size: 14px;
    line-height: 1.2;
    color: #047857;
    flex: 0 0 auto;
  }
  .kyc-badge svg, .kyc-badge i.lucide { width: 12px; height: 12px; stroke-width: 1.75; }

  /* Compact secondary button matching badge height */
  .btn-mini {
    height: 30px;
    border-radius: 999px;
    padding: 0 12px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--slate-300, #C8CFE1);
    background: #FFF;
    display: inline-flex;
    gap: 6px;
    align-items: center;
    cursor: pointer;
    color: var(--slate-900);
  }
  .btn-mini i.lucide { width: 14px; height: 14px; stroke-width: 1.75; }
</style>
</head>
<body>

  <div class="oms-customer-profile" data-device="desktop">
    <div class="oms-cp__info">
      <div class="oms-cp__name-row">
        <h2 class="oms-cp__name">Jane Doe</h2>
        <span class="kyc-badge"><i data-lucide="circle-check-big"></i>KYC</span>
        <button class="btn-mini" style="border-color: rgb(100, 112, 143)"><i data-lucide="eye"></i>View details</button>
      </div>
      <div class="oms-cp__details">
        <span class="oms-cp-atom" data-copyable title="Click to copy">
          <span class="oms-cp-atom__icon"><i data-lucide="id-card"></i></span>
          <span class="oms-cp-atom__label">cust_01km…e1wr</span>
          <span class="oms-cp-atom__copy"><i data-lucide="copy"></i></span>
        </span>
        <span class="oms-cp__bullet"></span>
        <span class="oms-cp-atom" data-copyable title="Click to copy">
          <span class="oms-cp-atom__icon"><i data-lucide="mail"></i></span>
          <span class="oms-cp-atom__label">jd@email.com</span>
          <span class="oms-cp-atom__copy"><i data-lucide="copy"></i></span>
        </span>
        <span class="oms-cp__bullet"></span>
        <span class="oms-cp-atom">
          <span class="oms-cp-atom__icon"><i data-lucide="user-round"></i></span>
          <span class="oms-cp-atom__label">Individual</span>
        </span>
      </div>
    </div>
    <div class="oms-cp__balance">
      <p class="oms-cp__balance-label">Total balance</p>
      <p class="oms-cp__balance-value">$12,345.67</p>
    </div>
  </div>

<script>lucide.createIcons();</script>
<script src="../components/customer_profile.js"></script>
</body>
</html>

<style id="__om-edit-overrides">
:is(button,input,textarea) path { stroke-width: 1px !important }
:is(button,input,textarea) circle { stroke-width: 1px !important }
</style>
