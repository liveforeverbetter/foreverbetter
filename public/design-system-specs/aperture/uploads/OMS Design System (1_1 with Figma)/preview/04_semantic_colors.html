<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-page-default); }
  body { padding: 20px 24px; font-family: var(--font-doc); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .name { font-family: var(--font-doc); font-weight: 500; font-size: 12px; color: var(--fg-primary); margin-bottom: 4px; }
  .pair { display: flex; gap: 6px; height: 56px; }
  .tile { flex: 1; border-radius: 8px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; }
  .lbl { font-family: var(--font-doc); font-size: 10px; opacity: 0.9; }
  .hex { font-family: var(--font-doc); font-size: 10px; font-weight: 500; }
</style>
</head>
<body>
  <div class="grid">
    <div class="group">
      <div class="name">info</div>
      <div class="pair">
        <div class="tile" style="background:var(--bg-info);    color:var(--fg-info); border:1px solid var(--border-info);"><span class="lbl">bg</span><span class="hex">purple/50</span></div>
        <div class="tile" style="background:var(--bg-info-inv); color:#fff;"><span class="lbl">bg-inv</span><span class="hex">purple/500</span></div>
      </div>
    </div>
    <div class="group">
      <div class="name">success</div>
      <div class="pair">
        <div class="tile" style="background:var(--bg-success);    color:var(--fg-success); border:1px solid var(--border-success);"><span class="lbl">bg</span><span class="hex">emerald/50</span></div>
        <div class="tile" style="background:var(--bg-success-inv); color:#fff;"><span class="lbl">bg-inv</span><span class="hex">emerald/600</span></div>
      </div>
    </div>
    <div class="group">
      <div class="name">warning</div>
      <div class="pair">
        <div class="tile" style="background:var(--bg-warning);    color:var(--fg-warning); border:1px solid var(--border-warning);"><span class="lbl">bg</span><span class="hex">orange/50</span></div>
        <div class="tile" style="background:var(--bg-warning-inv); color:#fff;"><span class="lbl">bg-inv</span><span class="hex">amber/600</span></div>
      </div>
    </div>
    <div class="group">
      <div class="name">danger</div>
      <div class="pair">
        <div class="tile" style="background:var(--bg-danger);    color:var(--fg-danger); border:1px solid var(--border-danger);"><span class="lbl">bg</span><span class="hex">red/50</span></div>
        <div class="tile" style="background:var(--bg-danger-inv); color:#fff;"><span class="lbl">bg-inv</span><span class="hex">red/600</span></div>
      </div>
    </div>
  </div>
</body>
</html>
