<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand purple scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-page-default); }
  body { padding: 20px 24px; font-family: var(--font-doc); }
  .label { font-family: var(--font-doc); font-weight: 500; font-size: 12px; color: var(--fg-primary); margin-bottom: 10px; letter-spacing: 0.02em; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; border-radius: 8px; height: 64px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: space-between; }
  .step { font-family: var(--font-doc); font-weight: 500; font-size: 11px; }
  .hex  { font-family: var(--font-doc); font-size: 10px; opacity: 0.85; }
  .light { color: var(--slate-700); }
  .dark  { color: rgba(255,255,255,0.92); }
</style>
</head>
<body>
  <div class="label">Purple — brand</div>
  <div class="row">
    <div class="swatch light" style="background:var(--purple-50)">  <span class="step">50</span>  <span class="hex">#F6F3FB</span></div>
    <div class="swatch light" style="background:var(--purple-100)"> <span class="step">100</span> <span class="hex">#EAE4F5</span></div>
    <div class="swatch light" style="background:var(--purple-200)"> <span class="step">200</span> <span class="hex">#D5C4F2</span></div>
    <div class="swatch light" style="background:var(--purple-300)"> <span class="step">300</span> <span class="hex">#B78EEF</span></div>
    <div class="swatch dark"  style="background:var(--purple-400)"> <span class="step">400</span> <span class="hex">#9551F5</span></div>
    <div class="swatch dark"  style="background:var(--purple-500); outline: 2px solid var(--slate-950); outline-offset: 1px;"> <span class="step">500 · brand</span> <span class="hex">#670DE5</span></div>
    <div class="swatch dark"  style="background:var(--purple-600)"> <span class="step">600</span> <span class="hex">#500AB2</span></div>
    <div class="swatch dark"  style="background:var(--purple-700)"> <span class="step">700</span> <span class="hex">#400A8E</span></div>
    <div class="swatch dark"  style="background:var(--purple-800)"> <span class="step">800</span> <span class="hex">#32086E</span></div>
    <div class="swatch dark"  style="background:var(--purple-900)"> <span class="step">900</span> <span class="hex">#2F0B55</span></div>
    <div class="swatch dark"  style="background:var(--purple-950)"> <span class="step">950</span> <span class="hex">#1E0735</span></div>
  </div>
</body>
</html>
