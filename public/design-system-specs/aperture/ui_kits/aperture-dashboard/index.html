<!-- @dsCard group="Aperture Dashboard" viewport="1360x860" name="Aperture — web dashboard" subtitle="Overview · Action plan · Genetics · Biomarkers · Wearables — interactive" -->
<!-- @startingPoint section="Aperture Dashboard" subtitle="Web health dashboard — sidebar + 5 views" viewport="1360x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aperture — dashboard</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-body); color: var(--text-primary); background: var(--surface-page); }
  #app { display: flex; height: 100vh; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 14px; height: 64px; flex: 0 0 64px;
    padding: 0 32px; border-bottom: 1px solid var(--border-subtle); background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); }
  .search { display: flex; align-items: center; gap: 10px; flex: 1; max-width: 380px; height: 40px;
    padding: 0 14px; background: var(--surface-sunken); border-radius: 999px; color: var(--text-muted); font-size: 14px; }
  .env { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px;
    background: var(--brand-soft); color: var(--text-brand); font-size: 13px; font-weight: 600; }
  .content { flex: 1; overflow-y: auto; padding: 30px 32px 48px; }
  .content-inner { max-width: 1120px; margin: 0 auto; }
  .avatar { width: 38px; height: 38px; border-radius: 999px; background: var(--grad-vitality); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div class="search"><i data-lucide="search" style="width:18px"></i> Search metrics, markers, or traits</div>
      <div style="flex:1"></div>
      <div class="env"><i data-lucide="shield-check" style="width:15px"></i> HIPAA secured</div>
      <button aria-label="Notifications" style="border:none;background:transparent;color:var(--text-secondary);cursor:pointer;display:inline-flex;padding:8px"><i data-lucide="bell" style="width:20px"></i></button>
      <div class="avatar">MR</div>
    </div>
    <div class="content"><div class="content-inner" id="view"></div></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../aperture-app/app-data.js"></script>
<script type="text/babel" src="dash-views.jsx"></script>
<script type="text/babel">
const { Sidebar } = window.ApertureDesignSystem_6066d1;
const SI = (n) => <i data-lucide={n} style={{ width: 19, height: 19 }}></i>;

function Root() {
  const [view, setView] = React.useState("overview");
  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
    const c = document.querySelector(".content"); if (c) c.scrollTop = 0;
  });
  const View = window.DASH[view];
  const navItems = [
    { id: "overview", label: "Overview", icon: SI("layout-grid") },
    { id: "actionplan", label: "Action plan", icon: SI("target"), badge: 2 },
    { label: "Health record", section: true },
    { id: "genetics", label: "Genetics", icon: SI("dna") },
    { id: "biomarkers", label: "Biomarkers", icon: SI("flask-conical"), badge: 1 },
    { id: "wearables", label: "Wearables", icon: SI("watch") },
  ];
  const footer = (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 8px" }}>
      <div className="avatar" style={{ width: 34, height: 34, fontSize: 13 }}>MR</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>Maya Rowe</div>
        <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Aperture Complete</div>
      </div>
      <i data-lucide="settings" style={{ width: 18, color: "var(--text-muted)" }}></i>
    </div>
  );
  return (
    <React.Fragment>
      {ReactDOM.createPortal(
        <Sidebar brand="Aperture" active={view} onSelect={setView} items={navItems} footer={footer} style={{ height: "100vh" }} />,
        document.getElementById("sidebar"))}
      {View ? <View go={setView} /> : null}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("view")).render(<Root />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>
