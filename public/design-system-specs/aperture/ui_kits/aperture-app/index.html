<!-- @dsCard group="Aperture App" viewport="440x880" name="Aperture — mobile app" subtitle="Overview · Action plan · Genetics · Biomarkers · Wearables — interactive" -->
<!-- @startingPoint section="Aperture App" subtitle="Mobile health app — 5 screens, click-through" viewport="440x880" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aperture — mobile app</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #E7EAEC; font-family: var(--font-body); color: var(--text-primary);
    display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .phone { width: 402px; height: 830px; background: #000; border-radius: 52px; padding: 11px;
    box-shadow: 0 40px 90px -30px rgba(23,26,31,0.5); position: relative; }
  .screen { width: 100%; height: 100%; border-radius: 42px; overflow: hidden; position: relative;
    background: var(--surface-page); display: flex; flex-direction: column; }
  .statusbar { height: 52px; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 30px 6px; font-family: var(--font-display); font-weight: 700; font-size: 15px; flex: 0 0 52px;
    position: relative; z-index: 3; }
  .statusbar .icons { display: flex; gap: 7px; align-items: center; }
  .island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 108px; height: 30px;
    background: #000; border-radius: 999px; z-index: 5; }
  .canvas { flex: 1; overflow-y: auto; padding: 4px 18px 16px; }
  .canvas::-webkit-scrollbar { width: 0; }
  .gradtop { position: absolute; top: 0; left: 0; right: 0; height: 260px; z-index: 0;
    background: radial-gradient(120% 80% at 0% 0%, #C4EFE9 0%, transparent 55%),
      radial-gradient(120% 80% at 100% 0%, #EEF0FE 0%, transparent 50%),
      linear-gradient(180deg, #FBF3E3 0%, var(--surface-page) 75%); pointer-events: none; }
  .navwrap { flex: 0 0 auto; padding-bottom: 8px; position: relative; z-index: 3; }
  .content { position: relative; z-index: 2; }
</style>
</head>
<body>
<div class="phone">
  <div class="island"></div>
  <div class="screen">
    <div class="gradtop" id="gradtop"></div>
    <div class="statusbar">
      <span>9:41</span>
      <span class="icons"><i data-lucide="signal" style="width:16px"></i><i data-lucide="wifi" style="width:16px"></i><i data-lucide="battery-full" style="width:20px"></i></span>
    </div>
    <div class="canvas" id="canvas"><div class="content" id="root"></div></div>
    <div class="navwrap" id="nav"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="app-data.js"></script>
<script type="text/babel" src="AppOverview.jsx"></script>
<script type="text/babel" src="AppActionPlan.jsx"></script>
<script type="text/babel" src="AppGenetics.jsx"></script>
<script type="text/babel" src="AppBiomarkers.jsx"></script>
<script type="text/babel" src="AppWearables.jsx"></script>
<script type="text/babel">
const { TabBar } = window.ApertureDesignSystem_6066d1;
const NI = (n) => <i data-lucide={n} style={{ width: 22, height: 22 }}></i>;
const SCREENS = {
  overview:   { comp: () => window.AppOverview,   grad: true },
  actionplan: { comp: () => window.AppActionPlan, grad: false },
  genetics:   { comp: () => window.AppGenetics,   grad: false },
  biomarkers: { comp: () => window.AppBiomarkers, grad: false },
  wearables:  { comp: () => window.AppWearables,  grad: false },
};

function Root() {
  const [tab, setTab] = React.useState("overview");
  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
    document.getElementById("canvas").scrollTop = 0;
    document.getElementById("gradtop").style.opacity = SCREENS[tab].grad ? "1" : "0";
  });
  const Screen = SCREENS[tab].comp();
  return (
    <React.Fragment>
      {Screen ? <Screen go={setTab} /> : <div style={{ padding: 40, textAlign: "center", color: "var(--text-muted)" }}>Loading…</div>}
      {ReactDOM.createPortal(
        <TabBar active={tab} onSelect={setTab} items={[
          { id: "overview", label: "Home", icon: NI("house") },
          { id: "actionplan", label: "Plan", icon: NI("target") },
          { id: "genetics", label: "Genetics", icon: NI("dna") },
          { id: "biomarkers", label: "Labs", icon: NI("flask-conical") },
          { id: "wearables", label: "Devices", icon: NI("watch") },
        ]} />, document.getElementById("nav"))}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>
