<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 1280px; height: 854px; }
  .tile { display: flex; width: 1280px; height: 854px; }
  .main { flex: 1; background: var(--brand); display: flex; align-items: center; justify-content: center; }
  .main span { font-family: var(--font-display); font-weight: 800; font-size: 168px; letter-spacing: -0.03em; color: #fff; }
  .strip { display: flex; flex-direction: column; width: 300px; }
  .strip > div { flex: 1; }
</style>
</head>
<body>
<div class="tile">
  <div class="main"><span>Aperture</span></div>
  <div class="strip">
    <div style="background: var(--activity-500)"></div>
    <div style="background: var(--nutrition-500)"></div>
    <div style="background: var(--mind-500)"></div>
    <div style="background: var(--vitals-500)"></div>
  </div>
</div>
</body>
</html>
