<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Health App Screen" description="Aperture mobile screen shell — phone frame, insight banner, score, and pillar list" -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;500;600;700;800&display=swap">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body{margin:0;font-family:"Fustat",system-ui,sans-serif;background:#E7EAEC;color:#171A1F;display:flex;justify-content:center;padding:24px}
*{box-sizing:border-box}
.canvas::-webkit-scrollbar{width:0}
</style>
</helmet>
<div style="width:402px;height:830px;background:#000;border-radius:52px;padding:11px;box-shadow:0 40px 90px -30px rgba(23,26,31,.5)">
  <div style="width:100%;height:100%;border-radius:42px;overflow:hidden;background:#F4F6F7;display:flex;flex-direction:column;position:relative">
    <div style="position:absolute;top:0;left:0;right:0;height:260px;background:radial-gradient(120% 80% at 0% 0%,#C4EFE9 0%,transparent 55%),radial-gradient(120% 80% at 100% 0%,#EEF0FE 0%,transparent 50%),linear-gradient(180deg,#FBF3E3 0%,#F4F6F7 75%);pointer-events:none"></div>
    <div style="height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 6px;font-weight:700;font-size:15px;position:relative;z-index:3">
      <span>9:41</span>
      <span style="display:flex;gap:7px;align-items:center"><i data-lucide="signal" style="width:16px"></i><i data-lucide="wifi" style="width:16px"></i><i data-lucide="battery-full" style="width:20px"></i></span>
    </div>
    <div class="canvas" style="flex:1;overflow-y:auto;padding:4px 18px 24px;position:relative;z-index:2">
      <div style="padding:4px 2px 16px">
        <div style="font-size:13px;color:#6E7783">Tuesday, July 14</div>
        <div style="font-weight:800;font-size:24px;letter-spacing:-0.02em">{{ greeting }}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <x-import component-from-global-scope="ApertureDesignSystem_6066d1.InsightBanner" gradient="var(--grad-mesh)" glow="{{ true }}" eyebrow="Aperture insight" title="{{ insightTitle }}" body="{{ insightBody }}" dots="{{ three }}" hint-size="100%,240px"></x-import>
        <x-import component-from-global-scope="ApertureDesignSystem_6066d1.ScoreCard" score="{{ energy }}" band="Good" tone="good" delta="{{ two }}" description="Your energy score reflects last night's recovery and today's readiness." radius="xl" hint-size="100%,200px"></x-import>
        <div>
          <div style="font-weight:700;font-size:18px;margin:4px 2px 10px">Your pillars</div>
          <x-import component-from-global-scope="ApertureDesignSystem_6066d1.Card" radius="xl" padding="sm" hint-size="100%,240px">
            <div style="display:flex;align-items:center;gap:14px;padding:12px 8px;border-bottom:1px solid #ECEEF1">
              <span style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;flex:0 0 40px;border-radius:999px;background:var(--sleep-50);color:var(--sleep-500)"><i data-lucide="moon" style="width:20px"></i></span>
              <div style="flex:1"><div style="font-weight:600;font-size:14px">Sleep</div><div style="font-size:13px;color:#6E7783;margin-top:2px">Good</div></div>
              <div style="font-family:'Geist Mono',monospace;font-weight:600">7h 12m</div>
            </div>
            <div style="display:flex;align-items:center;gap:14px;padding:12px 8px;border-bottom:1px solid #ECEEF1">
              <span style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;flex:0 0 40px;border-radius:999px;background:var(--activity-50);color:var(--activity-500)"><i data-lucide="footprints" style="width:20px"></i></span>
              <div style="flex:1"><div style="font-weight:600;font-size:14px">Activity</div><div style="font-size:13px;color:#6E7783;margin-top:2px">On track</div></div>
              <div style="font-family:'Geist Mono',monospace;font-weight:600">9,204</div>
            </div>
            <div style="display:flex;align-items:center;gap:14px;padding:12px 8px;border-bottom:1px solid #ECEEF1">
              <span style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;flex:0 0 40px;border-radius:999px;background:var(--nutrition-50);color:var(--nutrition-500)"><i data-lucide="apple" style="width:20px"></i></span>
              <div style="flex:1"><div style="font-weight:600;font-size:14px">Nutrition</div><div style="font-size:13px;color:#6E7783;margin-top:2px">Under</div></div>
              <div style="font-family:'Geist Mono',monospace;font-weight:600">1,840</div>
            </div>
            <div style="display:flex;align-items:center;gap:14px;padding:12px 8px">
              <span style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;flex:0 0 40px;border-radius:999px;background:var(--mind-50);color:var(--mind-500)"><i data-lucide="brain" style="width:20px"></i></span>
              <div style="flex:1"><div style="font-weight:600;font-size:14px">Mindfulness</div><div style="font-size:13px;color:#6E7783;margin-top:2px">Good</div></div>
              <div style="font-family:'Geist Mono',monospace;font-weight:600">12 min</div>
            </div>
          </x-import>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:450,&quot;height&quot;:880},&quot;greeting&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Good morning, Maya&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;insightTitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Your recovery is trending up&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;insightBody&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;HRV rose 8% this week and your resting heart rate is at a 30-day low.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;energy&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:82,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      greeting: this.props.greeting ?? "Good morning, Maya",
      insightTitle: this.props.insightTitle ?? "Your recovery is trending up",
      insightBody: this.props.insightBody ?? "HRV rose 8% this week and your resting heart rate is at a 30-day low. Your body is adapting well — a good window to push training.",
      energy: this.props.energy ?? 82,
      two: 2, three: 3,
    };
  }
  componentDidMount() { if (window.lucide) window.lucide.createIcons(); }
  componentDidUpdate() { if (window.lucide) window.lucide.createIcons(); }
}
</script>
</body>
</html>
