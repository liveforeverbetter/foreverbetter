<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Health Dashboard" description="Aperture web dashboard shell — sidebar nav + insight, score, pillars, and data-viz cards" -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;500;600;700;800&display=swap">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body{margin:0;font-family:"Fustat",system-ui,sans-serif;background:#F4F6F7;color:#171A1F}
*{box-sizing:border-box}
</style>
</helmet>
<div style="display:flex;min-height:100vh">
  <aside style="width:248px;flex:0 0 248px;background:#fff;border-right:1px solid #ECEEF1;padding:22px 16px">
    <div style="display:flex;align-items:center;gap:10px;padding:0 10px 22px">
      <span style="width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#23AE9F,#0B8783);color:#fff"><i data-lucide="aperture" style="width:17px"></i></span>
      <span style="font-weight:800;font-size:19px;letter-spacing:-0.02em">Aperture</span>
    </div>
    <nav style="display:flex;flex-direction:column;gap:2px">
      <a href="#" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;background:#E6F7F5;color:#0B8783;font-weight:600;font-size:14px;text-decoration:none"><i data-lucide="layout-grid" style="width:19px"></i>Overview</a>
      <a href="#" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;color:#515A66;font-weight:500;font-size:14px;text-decoration:none"><i data-lucide="target" style="width:19px"></i>Action plan</a>
      <div style="padding:16px 12px 6px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9AA2AE">Health record</div>
      <a href="#" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;color:#515A66;font-weight:500;font-size:14px;text-decoration:none"><i data-lucide="dna" style="width:19px"></i>Genetics</a>
      <a href="#" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;color:#515A66;font-weight:500;font-size:14px;text-decoration:none"><i data-lucide="flask-conical" style="width:19px"></i>Biomarkers</a>
      <a href="#" style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;color:#515A66;font-weight:500;font-size:14px;text-decoration:none"><i data-lucide="watch" style="width:19px"></i>Wearables</a>
    </nav>
  </aside>
  <main style="flex:1;padding:30px 32px 48px;max-width:1120px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px">
      <div>
        <div style="font-size:13px;color:#6E7783;margin-bottom:4px">Tuesday, July 14</div>
        <h1 style="margin:0;font-weight:800;font-size:30px;letter-spacing:-0.02em">Good morning, Maya</h1>
      </div>
      <x-import component-from-global-scope="ApertureDesignSystem_6066d1.Button" variant="primary" hint-size="150px,42px">Log a reading</x-import>
    </div>
    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:18px;margin-bottom:18px">
      <x-import component-from-global-scope="ApertureDesignSystem_6066d1.InsightBanner" gradient="var(--grad-mesh)" glow="{{ true }}" eyebrow="Aperture insight" title="{{ insightTitle }}" body="{{ insightBody }}" dots="{{ three }}" hint-size="100%,240px"></x-import>
      <x-import component-from-global-scope="ApertureDesignSystem_6066d1.ScoreCard" score="{{ energy }}" band="Good" tone="good" delta="{{ two }}" description="Your energy score reflects last night's recovery and today's readiness to train." radius="xl" hint-size="100%,240px"></x-import>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
      <sc-for list="{{ pillars }}" as="p" hint-placeholder-count="4">
        <x-import component-from-global-scope="ApertureDesignSystem_6066d1.MetricTile" label="{{ p.label }}" value="{{ p.value }}" status="{{ p.status }}" status-tone="{{ p.tone }}" hint-size="100%,120px"></x-import>
      </sc-for>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:720},&quot;insightTitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Your recovery is trending up&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;insightBody&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;HRV rose 8% this week and your resting heart rate is at a 30-day low.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;energy&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:82,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      insightTitle: this.props.insightTitle ?? "Your recovery is trending up",
      insightBody: this.props.insightBody ?? "HRV rose 8% this week and your resting heart rate is at a 30-day low. Your body is adapting well — a good window to push training.",
      energy: this.props.energy ?? 82,
      two: 2, three: 3,
      pillars: [
        { label: "Sleep", value: "7h 12m", status: "Good", tone: "good" },
        { label: "Activity", value: "9,204", status: "On track", tone: "good" },
        { label: "Nutrition", value: "1,840", status: "Under", tone: "fair" },
        { label: "Mindfulness", value: "12 min", status: "Good", tone: "good" },
      ],
    };
  }
  componentDidMount() { if (window.lucide) window.lucide.createIcons(); }
  componentDidUpdate() { if (window.lucide) window.lucide.createIcons(); }
}
</script>
</body>
</html>
